const CAT_COLORS={"Government":"#a78bfa","CVE Database":"#f87171","OS & Platform":"#60a5fa","Network":"#34d399","Endpoint":"#fb923c","Cloud":"#38bdf8","Browser/Middleware":"#fbbf24","Your Stack":"#c084fc","Threat Intel":"#f472b6","News":"#94a3b8"};

const Badge=({sev})=>{const c=SEV[sev]||SEV.Unknown;return <span style={{background:c.badge,color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700,letterSpacing:1}}>{sev?.toUpperCase()}</span>};
const ZD=()=><span style={{background:"#cc00cc",color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700,marginLeft:4,letterSpacing:1}}>0-DAY</span>;
const NewBadge=()=><span className="new-badge" style={{background:"#1f6feb",color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700,marginLeft:4,letterSpacing:1}}>NEW</span>;

function countdown(ms){const d=Math.max(0,ms-Date.now());const h=Math.floor(d/3600000);const m=Math.floor((d%3600000)/60000);const s=Math.floor((d%60000)/1000);return `${h}h ${String(m).padStart(2,"0")}m ${String(s).padStart(2,"0")}s`;}

function App(){
  const ls=k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}};
  const [tab,setTab]=useState("feed");
  const [sources,setSources]=useState(()=>ls("sad_sources")||SOURCE_LIBRARY);
  const [advisories,setAdvisories]=useState(()=>{const a=ls("sad_advisories");return a?.length?a:MOCK});
  const [digest,setDigest]=useState(()=>localStorage.getItem("sad_digest")||"");
  const [dLoad,setDLoad]=useState(false);
  const [fLoad,setFLoad]=useState(false);
  const [fSev,setFSev]=useState("All");
  const [fVen,setFVen]=useState("All");
  const [fCat,setFCat]=useState("All");
  const [fZD,setFZD]=useState(false);
  const [fNew,setFNew]=useState(false);
  const [search,setSearch]=useState("");
  const [addOpen,setAddOpen]=useState(false);
  const [newSrc,setNewSrc]=useState({name:"",vendor:"",cat:"Your Stack",rss:"",url:""});
  const [sel,setSel]=useState(null);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem("sad_apikey")||"");
  const [showKey,setShowKey]=useState(false);
  const [autoRefresh,setAutoRefresh]=useState(()=>ls("sad_autorefresh")??true);
  const [refreshInterval,setRefreshInterval]=useState(()=>localStorage.getItem("sad_interval")||"1hr");
  const [lastFetched,setLastFetched]=useState(()=>localStorage.getItem("sad_lastfetched")||null);
  const [nextRefresh,setNextRefresh]=useState(null);
  const [notifEnabled,setNotifEnabled]=useState(()=>ls("sad_notif")??false);
  const [notifPerm,setNotifPerm]=useState(()=>typeof Notification!=="undefined"?Notification.permission:"denied");
  const [newCount,setNewCount]=useState(0);
  const [ticker,setTicker]=useState(0);
  const [refreshLog,setRefreshLog]=useState(()=>ls("sad_log")||[]);
  const [srcSearch,setSrcSearch]=useState("");
  const [srcCat,setSrcCat]=useState("All");
  const [srcTier,setSrcTier]=useState("All");
  const timerRef=useRef(null);
  const refreshedOnce=useRef(false);

  useEffect(()=>{localStorage.setItem("sad_sources",JSON.stringify(sources))},[sources]);
  useEffect(()=>{localStorage.setItem("sad_advisories",JSON.stringify(advisories))},[advisories]);
  useEffect(()=>{if(digest)localStorage.setItem("sad_digest",digest)},[digest]);
  useEffect(()=>{localStorage.setItem("sad_apikey",apiKey)},[apiKey]);
  useEffect(()=>{localStorage.setItem("sad_autorefresh",JSON.stringify(autoRefresh))},[autoRefresh]);
  useEffect(()=>{localStorage.setItem("sad_interval",refreshInterval)},[refreshInterval]);
  useEffect(()=>{localStorage.setItem("sad_notif",JSON.stringify(notifEnabled))},[notifEnabled]);
  useEffect(()=>{if(lastFetched)localStorage.setItem("sad_lastfetched",lastFetched)},[lastFetched]);
  useEffect(()=>{localStorage.setItem("sad_log",JSON.stringify(refreshLog))},[refreshLog]);
  useEffect(()=>{const t=setInterval(()=>setTicker(v=>v+1),1000);return()=>clearInterval(t)},[]);

  const sendNotification=useCallback((items)=>{
    if(!notifEnabled||notifPerm!=="granted"||!items.length)return;
    const crit=items.filter(a=>a.severity==="Critical"||a.zeroDay);
    if(!crit.length)return;
    try{new Notification(`🛡️ ${crit.length} Critical/Zero-Day Alert${crit.length>1?"s":""}`,{body:crit.slice(0,3).map(a=>`${a.zeroDay?"[0-DAY] ":""}${a.id}: ${a.title}`).join("\n")});}catch(e){}
  },[notifEnabled,notifPerm]);

  const doRefresh=useCallback(async(manual=false)=>{
    setFLoad(true);
    const now=new Date();
    let injected=[];

    if(PROXY_URL){
      // ── LIVE MODE ─────────────────────────────────────────────────────────
      try{
        const enabledIds=sources.filter(s=>s.enabled&&s.rss).map(s=>s.id);
        const res=await fetch(`${PROXY_URL}/feeds/all`,{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({sources:enabledIds}),
        });
        if(!res.ok)throw new Error("Proxy returned "+res.status);
        const data=await res.json();
        if(data.items?.length){
          setAdvisories(prev=>{
            const existingIds=new Set(prev.map(a=>a.id));
            injected=data.items.filter(a=>!existingIds.has(a.id)).map(a=>({...a,isNew:true}));
            if(injected.length){setNewCount(c=>c+injected.length);sendNotification(injected);}
            const merged=[...injected,...prev.filter(a=>!data.items.find(x=>x.id===a.id))];
            return merged.slice(0,500);
          });
        }
      }catch(err){
        console.error("Proxy error:",err.message);
        alert("⚠️ Proxy fetch failed: "+err.message+"\n\nCheck your PROXY_URL in the dashboard.");
      }
    }else{
      // ── DEMO MODE ─────────────────────────────────────────────────────────
      await new Promise(r=>setTimeout(r,1400));
      if(manual&&!refreshedOnce.current){
        refreshedOnce.current=true;
        setAdvisories(prev=>{
          const ids=new Set(prev.map(a=>a.id));
          injected=SIMULATED_NEW.filter(a=>!ids.has(a.id));
          if(injected.length){setNewCount(c=>c+injected.length);sendNotification(injected);}
          return injected.length?[...injected,...prev]:prev;
        });
      }
    }

    const ts=now.toLocaleString();
    setLastFetched(ts);
    setNextRefresh(Date.now()+INTERVALS[refreshInterval]);
    setRefreshLog(prev=>[{time:ts,count:injected.length,manual,live:!!PROXY_URL},...prev].slice(0,20));
    setFLoad(false);
  },[sources,refreshInterval,sendNotification]);

  // Proxy health check on load
  useEffect(()=>{
    if(!PROXY_URL)return;
    fetch(`${PROXY_URL}/health`)
      .then(r=>r.json())
      .then(d=>console.log("✅ Proxy connected:",d.sources,"sources,",d.uptime,"uptime"))
      .catch(()=>console.warn("⚠️ Proxy unreachable — check PROXY_URL"));
  },[]);

  useEffect(()=>{
    if(timerRef.current)clearInterval(timerRef.current);
    if(!autoRefresh)return;
    const ms=INTERVALS[refreshInterval];
    setNextRefresh(Date.now()+ms);
    timerRef.current=setInterval(()=>doRefresh(false),ms);
    return()=>clearInterval(timerRef.current);
  },[autoRefresh,refreshInterval]);

  const vendors=["All",...Array.from(new Set(advisories.map(a=>a.vendor)))];
  const cats=["All",...Array.from(new Set(advisories.map(a=>a.cat).filter(Boolean)))];
  const filtered=advisories.filter(a=>
    (fSev==="All"||a.severity===fSev)&&(fVen==="All"||a.vendor===fVen)&&
    (fCat==="All"||a.cat===fCat)&&(!fZD||a.zeroDay)&&(!fNew||a.isNew)&&
    (!search||[a.title,a.id,a.vendor,a.summary].some(f=>f?.toLowerCase().includes(search.toLowerCase())))
  );

  const stats={critical:advisories.filter(a=>a.severity==="Critical").length,high:advisories.filter(a=>a.severity==="High").length,medium:advisories.filter(a=>a.severity==="Medium").length,low:advisories.filter(a=>a.severity==="Low").length,zeroDay:advisories.filter(a=>a.zeroDay).length,total:advisories.length,newItems:advisories.filter(a=>a.isNew).length};
  const srcStats={total:sources.length,enabled:sources.filter(s=>s.enabled).length,withRSS:sources.filter(s=>s.rss&&s.enabled).length};

  const filteredSources=sources.filter(s=>
    (srcCat==="All"||s.cat===srcCat)&&(srcTier==="All"||String(s.tier)===srcTier)&&
    (!srcSearch||[s.name,s.vendor,s.cat].some(f=>f?.toLowerCase().includes(srcSearch.toLowerCase())))
  );

  const toggleSrc=id=>setSources(s=>s.map(x=>x.id===id?{...x,enabled:!x.enabled}:x));
  const toggleCat=cat=>setSources(s=>s.map(x=>x.cat===cat?{...x,enabled:!s.find(y=>y.cat===cat)?.enabled}:x));
  const addSrc=()=>{if(!newSrc.name||!newSrc.vendor)return;setSources(s=>[...s,{...newSrc,id:Date.now().toString(),tier:3,enabled:true}]);setNewSrc({name:"",vendor:"",cat:"Your Stack",rss:"",url:""});setAddOpen(false);};
  const removeSrc=id=>setSources(s=>s.filter(x=>x.id!==id));
  const clearNew=()=>{setAdvisories(p=>p.map(a=>({...a,isNew:false})));setNewCount(0);};

  const exportCSV=()=>{
    const h=["ID","Vendor","Category","Title","Severity","CVSS","Date","ZeroDay","New","URL"];
    const rows=advisories.map(a=>[a.id,a.vendor,a.cat||"",`"${a.title}"`,a.severity,a.cvss||"",a.date,a.zeroDay?"Yes":"No",a.isNew?"Yes":"No",a.url]);
    const csv=[h,...rows].map(r=>r.join(",")).join("\n");
    const b=new Blob([csv],{type:"text/csv"});const u=URL.createObjectURL(b);const l=document.createElement("a");l.href=u;l.download="security_advisories.csv";l.click();URL.revokeObjectURL(u);
  };

  const genDigest=useCallback(async()=>{
    if(!apiKey){alert("Enter your Anthropic API key in Settings first.");setTab("settings");return;}
    setDLoad(true);
    const top=[...advisories].sort((a,b)=>(b.cvss||0)-(a.cvss||0)).slice(0,12);
    const prompt=`You are a senior SOC analyst. Generate a concise daily security advisory digest:\n1. Executive Summary (2-3 sentences)\n2. Critical/Zero-Day Alerts (must-act-today)\n3. High Priority Items by Category\n4. Notable Trends & Patterns\n5. Recommended Actions\n\nAdvisories:\n${top.map(a=>`[${a.severity}][${a.cat||"General"}] ${a.id} - ${a.title} (${a.vendor}, CVSS:${a.cvss||"N/A"}) ${a.zeroDay?"[ZERO-DAY]":""}: ${a.summary}`).join("\n")}\n\nBe concise, bullet-pointed, actionable. Today: ${new Date().toDateString()}.`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      if(data.error)setDigest("API Error: "+data.error.message);
      else setDigest(data.content?.map(b=>b.text||"").join("")||"No response.");
    }catch(e){setDigest("Error: "+e.message);}
    setDLoad(false);
  },[advisories,apiKey]);

  const requestNotifPerm=async()=>{if(typeof Notification==="undefined")return;const p=await Notification.requestPermission();setNotifPerm(p);if(p==="granted")setNotifEnabled(true);};
  const inp=ex=>({background:D,color:T,border:`1px solid ${B}`,borderRadius:6,padding:"7px 10px",...ex});
  const tabBtn=(t,label,badge)=>(<button onClick={()=>setTab(t)} style={{padding:"8px 16px",border:"none",borderRadius:6,cursor:"pointer",fontWeight:600,fontSize:13,background:tab===t?A:"transparent",color:tab===t?"#fff":M,position:"relative"}}>
    {label}{badge>0&&<span style={{position:"absolute",top:2,right:2,background:"#ff4444",color:"#fff",borderRadius:8,fontSize:10,padding:"1px 5px",fontWeight:700}}>{badge}</span>}
  </button>);

  return(
    <div style={{background:D,color:T,minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:C,borderBottom:`1px solid ${B}`,padding:"12px 20px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <span style={{fontSize:22}}>🛡️</span>
        <div><div style={{fontWeight:700,fontSize:15}}>Security Advisory Dashboard</div><div style={{color:M,fontSize:11}}>SOC Intelligence · {srcStats.enabled} Active Sources · AI-Powered</div></div>
        <div style={{background:"#21262d",border:`1px solid ${B}`,borderRadius:20,padding:"4px 12px",fontSize:12,display:"flex",alignItems:"center",gap:4}}>
          {autoRefresh?<span className="live-dot"/>:<span className="paused-dot"/>}
          <span style={{color:autoRefresh?"#00aa00":M}}>{autoRefresh?"Live":"Paused"}</span>
          {autoRefresh&&nextRefresh&&<span style={{color:M,marginLeft:4}}>· {countdown(nextRefresh)}</span>}
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={exportCSV} style={{...inp(),cursor:"pointer",fontSize:12,fontWeight:600,padding:"7px 12px"}}>⬇ CSV</button>
          <button onClick={()=>doRefresh(true)} disabled={fLoad} style={{background:"#21262d",color:T,border:`1px solid ${B}`,borderRadius:6,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>{fLoad?"⟳ Fetching...":"⟳ Refresh Now"}</button>
          <button onClick={genDigest} disabled={dLoad} style={{background:A,color:"#fff",border:"none",borderRadius:6,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>{dLoad?"✦ Generating...":"✦ AI Digest"}</button>
        </div>
      </div>

      {/* Stats */}
      <div style={{display:"flex",gap:8,padding:"10px 20px",flexWrap:"wrap"}}>
        {[["Total",stats.total,M],["Critical",stats.critical,"#ff4444"],["High",stats.high,"#ff7700"],["Medium",stats.medium,"#e6b800"],["Low",stats.low,"#00aa00"],["Zero-Days",stats.zeroDay,"#cc00cc"],["New",stats.newItems,"#1f6feb"],["Sources",srcStats.enabled,"#8b949e"]].map(([l,v,c])=>(
          <div key={l} onClick={l==="New"&&v>0?()=>{setFNew(true);setTab("feed");clearNew()}:undefined}
            style={{background:C,border:`1px solid ${l==="New"&&v>0?"#1f6feb":B}`,borderRadius:8,padding:"7px 14px",textAlign:"center",minWidth:68,cursor:l==="New"&&v>0?"pointer":"default"}}>
            <div style={{fontSize:18,fontWeight:700,color:c}}>{v}</div><div style={{fontSize:11,color:M}}>{l}</div>
          </div>
        ))}
        <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:"7px 14px",marginLeft:"auto",textAlign:"right"}}>
          <div style={{fontSize:11,color:M}}>Last Fetched</div><div style={{fontSize:12}}>{lastFetched||"Never"}</div>
        </div>
      </div>

      {newCount>0&&(
        <div style={{margin:"0 20px 10px",background:"#0d1f3c",border:"1px solid #1f6feb",borderRadius:8,padding:"10px 16px",display:"flex",alignItems:"center",gap:10}} className="new-badge">
          <span style={{fontSize:18}}>🔔</span>
          <span style={{flex:1}}><strong style={{color:"#58a6ff"}}>{newCount} new advisory{newCount>1?"ies":""}</strong> detected</span>
          <button onClick={()=>{setFNew(true);setTab("feed");}} style={{background:A,color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>View New</button>
          <button onClick={clearNew} style={{background:"none",border:`1px solid ${B}`,color:M,borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12}}>Dismiss</button>
        </div>
      )}

      {/* Tabs */}
      <div style={{padding:"0 20px 10px",display:"flex",gap:4,flexWrap:"wrap"}}>
        {tabBtn("feed","📋 Advisory Feed",stats.newItems)}
        {tabBtn("digest","✦ AI Digest",0)}
        {tabBtn("sources","📡 Sources ("+srcStats.enabled+")",0)}
        {tabBtn("autorefresh","🔄 Auto-Refresh",0)}
        {tabBtn("settings","🔑 Settings",0)}
      </div>

      <div style={{padding:"0 20px 24px"}}>

        {/* FEED */}
        {tab==="feed"&&(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
              <input placeholder="🔍 Search ID, title, vendor..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp({flex:1,minWidth:150})}}/>
              <select value={fSev} onChange={e=>setFSev(e.target.value)} style={inp()}>{["All","Critical","High","Medium","Low"].map(s=><option key={s}>{s}</option>)}</select>
              <select value={fVen} onChange={e=>setFVen(e.target.value)} style={inp()}>{vendors.map(v=><option key={v}>{v}</option>)}</select>
              <select value={fCat} onChange={e=>setFCat(e.target.value)} style={inp()}>{cats.map(c=><option key={c}>{c}</option>)}</select>
              <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",color:M,whiteSpace:"nowrap"}}><input type="checkbox" checked={fZD} onChange={e=>setFZD(e.target.checked)}/> 0-Day</label>
              <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",color:fNew?"#58a6ff":M,whiteSpace:"nowrap"}}><input type="checkbox" checked={fNew} onChange={e=>setFNew(e.target.checked)}/> New</label>
              <span style={{color:M,fontSize:12}}>{filtered.length} results</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {filtered.map(a=>{
                const c=SEV[a.severity]||SEV.Unknown;const open=sel===a.id;const cc=CAT_COLORS[a.cat]||"#888";
                return(<div key={a.id} onClick={()=>setSel(open?null:a.id)}
                  style={{background:a.isNew?"#0d1f3c":C,border:`1px solid ${a.isNew?"#1f6feb":a.zeroDay?"#cc00cc":c.border}`,borderLeft:`4px solid ${a.isNew?"#1f6feb":a.zeroDay?"#cc00cc":c.badge}`,borderRadius:8,padding:"12px 14px",cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:4}}>
                        <Badge sev={a.severity}/>{a.zeroDay&&<ZD/>}{a.isNew&&<NewBadge/>}
                        {a.cat&&<span style={{background:cc+"22",color:cc,border:`1px solid ${cc}44`,borderRadius:4,padding:"1px 7px",fontSize:11}}>{a.cat}</span>}
                        <span style={{color:M,fontSize:12}}>{a.vendor}</span><span style={{color:B}}>·</span>
                        <span style={{color:M,fontSize:12}}>{a.date}</span>
                        {a.cvss&&<span style={{color:c.text,fontSize:12,fontWeight:700}}>CVSS {a.cvss}</span>}
                      </div>
                      <div style={{fontWeight:600,marginBottom:3}}>{a.id} — {a.title}</div>
                      <div style={{color:M,fontSize:13}}>{a.summary}</div>
                    </div>
                    <span style={{color:M}}>{open?"▲":"▼"}</span>
                  </div>
                  {open&&(<div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${B}`}}>
                    <div style={{marginBottom:8}}><span style={{color:M,fontSize:12}}>Affected: </span>{a.products?.map(p=><span key={p} style={{background:"#21262d",border:`1px solid ${B}`,borderRadius:4,padding:"2px 8px",fontSize:12,marginRight:6}}>{p}</span>)}</div>
                    <a href={a.url} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{color:A,fontSize:13}}>🔗 View Official Advisory →</a>
                  </div>)}
                </div>);
              })}
              {filtered.length===0&&<div style={{color:M,textAlign:"center",padding:40}}>No advisories match current filters.</div>}
            </div>
          </div>
        )}

        {/* DIGEST */}
        {tab==="digest"&&(
          <div>{digest?(
            <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
                <div style={{fontWeight:700,fontSize:15}}>✦ AI Daily Security Digest</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{const b=new Blob([digest],{type:"text/plain"});const u=URL.createObjectURL(b);const l=document.createElement("a");l.href=u;l.download="security_digest.txt";l.click();}} style={{background:"#21262d",color:T,border:`1px solid ${B}`,borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:12}}>⬇ Export</button>
                  <button onClick={genDigest} disabled={dLoad} style={{background:A,color:"#fff",border:"none",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:12}}>{dLoad?"Regenerating...":"↺ Regenerate"}</button>
                </div>
              </div>
              <div style={{color:T,lineHeight:1.75,whiteSpace:"pre-wrap",fontSize:13}}>{digest}</div>
            </div>
          ):(
            <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:48,textAlign:"center"}}>
              <div style={{fontSize:40,marginBottom:12}}>✦</div>
              <div style={{fontWeight:600,marginBottom:8}}>No Digest Yet</div>
              <div style={{color:M,marginBottom:20}}>Generate an AI-powered SOC briefing across all {stats.total} advisories from {srcStats.enabled} sources.</div>
              <button onClick={genDigest} disabled={dLoad} style={{background:A,color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",cursor:"pointer",fontSize:14,fontWeight:600}}>{dLoad?"✦ Generating...":"✦ Generate AI Daily Digest"}</button>
            </div>
          )}</div>
        )}

        {/* SOURCES */}
        {tab==="sources"&&(
          <div>
            {/* Source Stats */}
            <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
              {[["Total Sources",srcStats.total,"#8b949e"],["Active",srcStats.enabled,"#00aa00"],["With RSS",srcStats.withRSS,"#1f6feb"],["Manual/Portal",srcStats.enabled-srcStats.withRSS,"#ff7700"]].map(([l,v,c])=>(
                <div key={l} style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:"8px 16px",textAlign:"center",minWidth:90}}>
                  <div style={{fontSize:18,fontWeight:700,color:c}}>{v}</div><div style={{fontSize:11,color:M}}>{l}</div>
                </div>
              ))}
              <div style={{marginLeft:"auto",display:"flex",gap:8}}>
                <button onClick={()=>setAddOpen(true)} style={{background:A,color:"#fff",border:"none",borderRadius:6,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:600}}>+ Add Custom</button>
              </div>
            </div>

            {/* Category Quick Toggles */}
            <div style={{marginBottom:14}}>
              <div style={{color:M,fontSize:12,marginBottom:8}}>Toggle by Category:</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {CATEGORIES.map(cat=>{
                  const catSrcs=sources.filter(s=>s.cat===cat);
                  const allOn=catSrcs.every(s=>s.enabled);
                  const cc=CAT_COLORS[cat]||"#888";
                  return(<button key={cat} onClick={()=>setSources(s=>s.map(x=>x.cat===cat?{...x,enabled:!allOn}:x))}
                    style={{background:allOn?cc+"33":"transparent",border:`1px solid ${allOn?cc:B}`,color:allOn?cc:M,borderRadius:20,padding:"4px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>
                    {cat} ({catSrcs.filter(s=>s.enabled).length}/{catSrcs.length})
                  </button>);
                })}
              </div>
            </div>

            {/* Filters */}
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
              <input placeholder="🔍 Search sources..." value={srcSearch} onChange={e=>setSrcSearch(e.target.value)} style={{...inp({flex:1,minWidth:140})}}/>
              <select value={srcCat} onChange={e=>setSrcCat(e.target.value)} style={inp()}>
                <option value="All">All Categories</option>{CATEGORIES.map(c=><option key={c}>{c}</option>)}
              </select>
              <select value={srcTier} onChange={e=>setSrcTier(e.target.value)} style={inp()}>
                <option value="All">All Tiers</option><option value="1">Tier 1 — Primary</option><option value="2">Tier 2 — Secondary</option>
              </select>
              <span style={{color:M,fontSize:12,alignSelf:"center"}}>{filteredSources.length} shown</span>
            </div>

            {addOpen&&(
              <div style={{background:C,border:`1px solid ${A}`,borderRadius:8,padding:14,marginBottom:12}}>
                <div style={{fontWeight:600,marginBottom:10}}>Add Custom Source</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <input placeholder="Source name" value={newSrc.name} onChange={e=>setNewSrc(s=>({...s,name:e.target.value}))} style={{...inp({flex:1,minWidth:130})}}/>
                  <input placeholder="Vendor" value={newSrc.vendor} onChange={e=>setNewSrc(s=>({...s,vendor:e.target.value}))} style={{...inp({width:120})}}/>
                  <select value={newSrc.cat} onChange={e=>setNewSrc(s=>({...s,cat:e.target.value}))} style={inp()}>
                    {CATEGORIES.map(c=><option key={c}>{c}</option>)}
                  </select>
                  <input placeholder="RSS/Atom URL (optional)" value={newSrc.rss} onChange={e=>setNewSrc(s=>({...s,rss:e.target.value}))} style={{...inp({flex:2,minWidth:180})}}/>
                  <input placeholder="Portal URL" value={newSrc.url} onChange={e=>setNewSrc(s=>({...s,url:e.target.value}))} style={{...inp({flex:1,minWidth:140})}}/>
                </div>
                <div style={{display:"flex",gap:8,marginTop:10}}>
                  <button onClick={addSrc} style={{background:A,color:"#fff",border:"none",borderRadius:6,padding:"7px 14px",cursor:"pointer",fontSize:13}}>Add</button>
                  <button onClick={()=>setAddOpen(false)} style={{background:"#21262d",color:T,border:`1px solid ${B}`,borderRadius:6,padding:"7px 14px",cursor:"pointer",fontSize:13}}>Cancel</button>
                </div>
              </div>
            )}

            {/* Source Cards grouped by category */}
            {CATEGORIES.filter(cat=>srcCat==="All"||cat===srcCat).map(cat=>{
              const catSrcs=filteredSources.filter(s=>s.cat===cat);
              if(!catSrcs.length)return null;
              const cc=CAT_COLORS[cat]||"#888";
              return(
                <div key={cat} style={{marginBottom:16}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <div style={{width:10,height:10,borderRadius:2,background:cc}}/>
                    <span style={{fontWeight:700,color:cc,fontSize:13}}>{cat}</span>
                    <span style={{color:M,fontSize:12}}>({catSrcs.filter(s=>s.enabled).length}/{catSrcs.length} enabled)</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {catSrcs.map(s=>(
                      <div key={s.id} style={{background:C,border:`1px solid ${s.enabled?cc+"44":B}`,borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:34,height:18,background:s.enabled?cc:"#444",borderRadius:9,cursor:"pointer",position:"relative",flexShrink:0}} onClick={()=>toggleSrc(s.id)}>
                          <div style={{width:14,height:14,background:"#fff",borderRadius:7,position:"absolute",top:2,left:s.enabled?18:2,transition:"left 0.2s"}}/>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontWeight:600,fontSize:13}}>{s.name}</span>
                            {s.tier===1&&<span style={{background:"#1f6feb22",color:"#58a6ff",border:"1px solid #1f6feb44",borderRadius:3,padding:"1px 5px",fontSize:10}}>T1</span>}
                            {s.tier===2&&<span style={{background:"#88888822",color:M,border:`1px solid ${B}`,borderRadius:3,padding:"1px 5px",fontSize:10}}>T2</span>}
                          </div>
                          <div style={{color:M,fontSize:11,marginTop:1}}>{s.vendor}{s.rss?" · RSS ✓":" · Portal only"}</div>
                        </div>
                        {s.url&&<a href={s.url} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{color:M,fontSize:12,flexShrink:0}}>↗</a>}
                        <span style={{background:s.rss?"#00aa0022":"#88888822",color:s.rss?"#00aa00":M,border:`1px solid ${s.rss?"#00aa00":B}`,borderRadius:4,padding:"2px 6px",fontSize:10,flexShrink:0}}>{s.rss?"RSS":"Portal"}</span>
                        {(!SOURCE_LIBRARY.find(x=>x.id===s.id))&&<button onClick={()=>removeSrc(s.id)} style={{background:"none",border:"none",color:"#ff4444",cursor:"pointer",fontSize:16,flexShrink:0}}>✕</button>}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
            <div style={{marginTop:14,background:"#1f2d1f",border:"1px solid #2a4a2a",borderRadius:8,padding:12,color:"#6ea86e",fontSize:12}}>
              <strong>ℹ️ Tier 1</strong> = Primary OEM/government sources (highest trust). <strong>Tier 2</strong> = Trusted secondary sources. Portal-only sources require a backend proxy or manual check — RSS sources can be fully automated once a proxy is configured.
            </div>
          </div>
        )}

        {/* AUTO-REFRESH */}
        {tab==="autorefresh"&&(
          <div style={{maxWidth:580}}>
            <div style={{background:C,border:`1px solid ${autoRefresh?"#00aa00":B}`,borderRadius:8,padding:20,marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div>
                  <div style={{fontWeight:700,fontSize:15,display:"flex",alignItems:"center",gap:8}}>{autoRefresh?<span className="live-dot"/>:<span className="paused-dot"/>}Auto-Refresh is {autoRefresh?"Active":"Paused"}</div>
                  <div style={{color:M,fontSize:12,marginTop:2}}>Monitors {srcStats.withRSS} RSS-enabled sources automatically</div>
                </div>
                <div style={{width:48,height:26,background:autoRefresh?"#00aa00":"#444",borderRadius:13,cursor:"pointer",position:"relative"}} onClick={()=>setAutoRefresh(v=>!v)}>
                  <div style={{width:20,height:20,background:"#fff",borderRadius:10,position:"absolute",top:3,left:autoRefresh?25:3,transition:"left 0.3s"}}/>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                <div style={{background:D,borderRadius:6,padding:"10px 14px"}}><div style={{color:M,fontSize:11,marginBottom:2}}>Last Fetched</div><div style={{fontSize:13,fontWeight:600}}>{lastFetched||"Never"}</div></div>
                <div style={{background:D,borderRadius:6,padding:"10px 14px"}}><div style={{color:M,fontSize:11,marginBottom:2}}>Next Refresh</div><div style={{fontSize:13,fontWeight:600,color:autoRefresh?"#00aa00":M}}>{autoRefresh&&nextRefresh?countdown(nextRefresh):"Paused"}</div></div>
              </div>
              <button onClick={()=>doRefresh(true)} disabled={fLoad} style={{background:A,color:"#fff",border:"none",borderRadius:6,padding:"8px 18px",cursor:"pointer",fontSize:13,fontWeight:600,width:"100%"}}>{fLoad?"⟳ Fetching...":"⟳ Refresh Now"}</button>
            </div>
            <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:20,marginBottom:14}}>
              <div style={{fontWeight:700,marginBottom:12}}>⏱ Refresh Interval</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {Object.entries(INTERVAL_LABELS).map(([k,label])=>(<div key={k} onClick={()=>setRefreshInterval(k)} style={{background:refreshInterval===k?A:D,border:`1px solid ${refreshInterval===k?A:B}`,borderRadius:6,padding:"10px 14px",cursor:"pointer",textAlign:"center",fontWeight:refreshInterval===k?700:400,color:refreshInterval===k?"#fff":T}}>{label}</div>))}
              </div>
            </div>
            <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:20,marginBottom:14}}>
              <div style={{fontWeight:700,marginBottom:4}}>🔔 Browser Notifications</div>
              <div style={{color:M,fontSize:12,marginBottom:12}}>Alert on Critical/Zero-Day detections during auto-refresh.</div>
              {notifPerm==="granted"?(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{color:"#00aa00",fontSize:13}}>✓ Permitted</span><div style={{width:40,height:22,background:notifEnabled?"#00aa00":"#444",borderRadius:11,cursor:"pointer",position:"relative"}} onClick={()=>setNotifEnabled(v=>!v)}><div style={{width:16,height:16,background:"#fff",borderRadius:8,position:"absolute",top:3,left:notifEnabled?21:3,transition:"left 0.3s"}}/></div></div>):notifPerm==="denied"?(<div style={{background:"#2d1f1f",border:"1px solid #ff444444",borderRadius:6,padding:"10px 14px",color:"#ff8888",fontSize:12}}>⚠️ Blocked in browser settings.</div>):(<button onClick={requestNotifPerm} style={{background:A,color:"#fff",border:"none",borderRadius:6,padding:"8px 18px",cursor:"pointer",fontSize:13,fontWeight:600}}>🔔 Enable Notifications</button>)}
            </div>
            <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{fontWeight:700}}>📋 Refresh Log</div><button onClick={()=>setRefreshLog([])} style={{background:"none",border:`1px solid ${B}`,color:M,borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12}}>Clear</button></div>
              {refreshLog.length===0?<div style={{color:M,fontSize:13,textAlign:"center",padding:"16px 0"}}>No history yet.</div>:(
                <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:200,overflowY:"auto"}}>
                  {refreshLog.map((l,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:D,borderRadius:6,padding:"8px 12px"}}>
                    <div style={{fontSize:12}}>{l.time}</div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      {l.count>0&&<span style={{background:"#1f6feb",color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700}}>{l.count} new</span>}
                      <span style={{color:M,fontSize:11}}>{l.manual?"Manual":"Auto"}</span>
                    </div>
                  </div>))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* SETTINGS */}
        {tab==="settings"&&(
          <div style={{maxWidth:560}}>
            <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:20,marginBottom:14}}>
              <div style={{fontWeight:700,marginBottom:4}}>🔑 Anthropic API Key</div>
              <div style={{color:M,fontSize:12,marginBottom:12}}>Required for AI Digest. Stored only in your browser's local storage.</div>
              <div style={{display:"flex",gap:8}}>
                <input type={showKey?"text":"password"} placeholder="sk-ant-..." value={apiKey} onChange={e=>setApiKey(e.target.value)} style={{...inp({flex:1})}}/>
                <button onClick={()=>setShowKey(v=>!v)} style={{background:"#21262d",color:T,border:`1px solid ${B}`,borderRadius:6,padding:"7px 12px",cursor:"pointer",fontSize:13}}>{showKey?"Hide":"Show"}</button>
              </div>
              {apiKey&&<div style={{color:"#00aa00",fontSize:12,marginTop:8}}>✓ API key saved</div>}
            </div>
            <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:20,marginBottom:14}}>
              <div style={{fontWeight:700,marginBottom:10}}>📊 Data Management</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={exportCSV} style={{background:"#21262d",color:T,border:`1px solid ${B}`,borderRadius:6,padding:"7px 12px",cursor:"pointer",fontSize:13}}>⬇ Export CSV</button>
                <button onClick={()=>{if(confirm("Reset advisories to defaults?")){setAdvisories(MOCK);setNewCount(0);localStorage.removeItem("sad_advisories");}}} style={{background:"#21262d",color:"#ff4444",border:"1px solid #ff444466",borderRadius:6,padding:"7px 12px",cursor:"pointer",fontSize:13}}>↺ Reset Advisories</button>
                <button onClick={()=>{if(confirm("Reset all sources to defaults?")){setSources(SOURCE_LIBRARY);localStorage.removeItem("sad_sources");}}} style={{background:"#21262d",color:"#ff7700",border:"1px solid #ff770066",borderRadius:6,padding:"7px 12px",cursor:"pointer",fontSize:13}}>↺ Reset Sources</button>
              </div>
            </div>
            <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:20}}>
              <div style={{fontWeight:700,marginBottom:8}}>🚀 Enabling Live RSS Feeds</div>
              <div style={{color:M,fontSize:12,lineHeight:1.75}}>
                {srcStats.withRSS} of your active sources have RSS feeds configured. To fetch them live, deploy a small proxy:<br/><br/>
                <strong style={{color:T}}>Node.js:</strong> <code style={{background:D,padding:"2px 6px",borderRadius:3,fontSize:11}}>npm install express cors axios</code><br/>
                <strong style={{color:T}}>Python:</strong> <code style={{background:D,padding:"2px 6px",borderRadius:3,fontSize:11}}>pip install flask flask-cors feedparser</code><br/>
                <strong style={{color:T}}>Serverless:</strong> Netlify or Vercel function that fetches and caches feeds hourly.<br/><br/>
                Sources without RSS marked as "Portal" require manual check or a scraper pointed at the vendor portal.
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
