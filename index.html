const SevBadge=({sev})=>{const c=SEV[sev]||SEV.Unknown;return <span style={{background:c.badge,color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700,letterSpacing:1}}>{(sev||"UNK").toUpperCase()}</span>};
const ZDBadge=()=><span style={{background:"#cc00cc",color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700,marginLeft:4,letterSpacing:1}}>0-DAY</span>;
const NewBadge=()=><span className="new-badge" style={{background:"#1f6feb",color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700,marginLeft:4,letterSpacing:1}}>NEW</span>;
const OEMBadge=()=><span style={{background:"#0a2a0a",color:"#4ade80",border:"1px solid #16a34a",borderRadius:4,padding:"1px 6px",fontSize:10,fontWeight:700,marginLeft:4}}>OEM</span>;
const SourceCountBadge=({count,sources})=>{if(!count||count<2)return null;const tip=sources?sources.join(", "):`Reported by ${count} sources`;return <span title={tip} style={{background:"#1f6feb22",color:"#58a6ff",border:"1px solid #1f6feb55",borderRadius:4,padding:"1px 7px",fontSize:10,fontWeight:700,marginLeft:4,cursor:"default"}}>📡 {count} sources</span>;};
function slaStatus(advisory){
  const limitH=SLA_HOURS[advisory.severity]||720;
  const pub=new Date(advisory.published||advisory.date||0);
  if(isNaN(pub.getTime()))return null;
  const elapsedH=(Date.now()-pub.getTime())/3600000;
  const remainH=limitH-elapsedH;
  return{overdue:remainH<0,urgent:remainH>=0&&remainH<limitH*0.1,remainH:Math.round(Math.abs(remainH)),limitH};
}
const SLABadge=({advisory})=>{
  const s=slaStatus(advisory);
  if(!s)return null;
  if(s.overdue)return <span className="sla-overdue" style={{background:"#ff000025",color:"#ff4444",border:"1px solid #ff444488",borderRadius:4,padding:"1px 7px",fontSize:10,fontWeight:700,marginLeft:4}}>⏰ SLA OVERDUE</span>;
  if(s.urgent)return <span style={{background:"#ff770020",color:"#ff8800",border:"1px solid #ff770066",borderRadius:4,padding:"1px 7px",fontSize:10,fontWeight:700,marginLeft:4}}>⚡ {s.remainH}h left</span>;
  return null;
};
const AckBadge=({by,at,note})=><span title={note||""} style={{background:"#0a2a0a",color:"#4ade80",border:"1px solid #16a34a",borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:600,marginLeft:4}}>✓ {by} · {fmtTs(at)}{note&&" 📝"}</span>;
const StatusBadge=({status})=>{const c=STATUS_COLORS[status]||"#888";return <span style={{background:c+"22",color:c,border:`1px solid ${c}44`,borderRadius:4,padding:"1px 7px",fontSize:10,fontWeight:700,marginLeft:4}}>{status}</span>;};
function countdown(ms){const d=Math.max(0,ms-Date.now());const h=Math.floor(d/3600000);const m=Math.floor((d%3600000)/60000);const s=Math.floor((d%60000)/1000);return`${h}h ${String(m).padStart(2,"0")}m ${String(s).padStart(2,"0")}s`;}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function LoginScreen({onLogin,onDenied}){
  const [code,setCode]=useState("");const [error,setError]=useState("");const [loading,setLoading]=useState(false);const [show,setShow]=useState(false);
  const verify=async()=>{
    if(!code.trim()){setError("Please enter the access code.");return;}
    setLoading(true);setError("");
    try{
      const res=await fetch(`${PROXY_URL}/auth/verify`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code:code.trim()})});
      const data=await res.json();
      if(data.valid){setSession(code.trim());onLogin();}
      else{setError("Invalid access code. Please try again.");setCode("");onDenied();}
    }catch{setError("Unable to verify — check your connection.");}
    setLoading(false);
  };
  return(
    <div style={{minHeight:"100vh",background:D,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:420,background:C,border:`1px solid ${B}`,borderRadius:12,padding:40,boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:48,marginBottom:12}}>🛡️</div>
          <div style={{fontSize:22,fontWeight:700,color:T}}>Security Advisory Dashboard</div>
          <div style={{fontSize:13,color:M,marginTop:6}}>Concentrix Endpoint Security</div>
        </div>
        <div style={{marginBottom:8,fontSize:13,color:M,fontWeight:600}}>Team Access Code</div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <input type={show?"text":"password"} placeholder="Enter access code..." value={code}
            onChange={e=>{setCode(e.target.value);setError("");}}
            onKeyDown={e=>e.key==="Enter"&&verify()}
            style={{flex:1,background:D,color:T,border:`1px solid ${error?"#ff4444":B}`,borderRadius:6,padding:"10px 14px",fontSize:14}} autoFocus/>
          <button onClick={()=>setShow(v=>!v)} style={{background:"#21262d",color:M,border:`1px solid ${B}`,borderRadius:6,padding:"0 12px",cursor:"pointer",fontSize:13}}>{show?"Hide":"Show"}</button>
        </div>
        {error&&<div style={{color:"#ff6b6b",fontSize:13,marginBottom:12,padding:"8px 12px",background:"#2d1f1f",borderRadius:6,border:"1px solid #ff444433"}}>{error}</div>}
        <button onClick={verify} disabled={loading}
          style={{width:"100%",background:loading?"#333":A,color:"#fff",border:"none",borderRadius:6,padding:"12px",fontSize:15,fontWeight:600,cursor:loading?"not-allowed":"pointer"}}>
          {loading?"Verifying...":"🔓 Access Dashboard"}
        </button>
        <div style={{textAlign:"center",marginTop:20,fontSize:11,color:"#6b7280"}}>Contact GSE team if you don't have the access code.</div>
      </div>
    </div>
  );
}

  useEffect(()=>{localStorage.setItem("sad_sources",JSON.stringify(sources))},[sources]);
  useEffect(()=>{localStorage.setItem("sad_autorefresh",JSON.stringify(autoRefresh))},[autoRefresh]);

  useEffect(()=>{localStorage.setItem("sad_digesttz",digestTZ)},[digestTZ]);
  useEffect(()=>{localStorage.setItem("sad_scheduleenabled",JSON.stringify(scheduleEnabled))},[scheduleEnabled]);
  // P6: countdown timer removed from here — lives in isolated CountdownTimer component
  useEffect(()=>{localStorage.setItem("sad_username",userName)},[userName]);
  useEffect(()=>{localStorage.setItem("sad_statuses",JSON.stringify(statuses))},[statuses]);
  useEffect(()=>{localStorage.setItem("sad_teams_webhook",teamsWebhook)},[teamsWebhook]);
  useEffect(()=>{try{localStorage.setItem("sad_triage",JSON.stringify(aiTriageResults))}catch{}},[aiTriageResults]);

  // Load acks from proxy on mount
  useEffect(()=>{
    if(!PROXY_URL)return;
    fetch(`${PROXY_URL}/ack`,{headers:getAuthHeader()})
      .then(r=>r.json()).then(d=>setAcks(d.acks||{})).catch(()=>{});
  },[]);

  // P2: Always fetch from proxy on mount — no localStorage fallback
  useEffect(()=>{doRefresh(false);},[]);

  const handleAck=useCallback(async(advisoryId,note,e)=>{
    if(e)e.stopPropagation();
    if(!userName.trim()){alert("Please set your name in Settings first.");return;}
    setAckingId(advisoryId);
    try{
      const res=await fetch(`${PROXY_URL}/ack`,{method:"POST",headers:{"Content-Type":"application/json",...getAuthHeader()},
        body:JSON.stringify({id:advisoryId,by:userName.trim(),note:note||""})});
      const data=await res.json();
      if(data.success){
        setAcks(p=>({...p,[advisoryId]:{by:userName.trim(),at:new Date().toISOString(),note:note||""}}));
        // Auto-set status to In Review if still New
        setStatuses(p=>({...p,[advisoryId]:p[advisoryId]||"In Review"}));
      }
    }catch(err){console.error("Ack failed",err);}
    setAckingId(null);setShowAckInput(null);setAckNote("");
  },[userName]);

  const handleUnack=useCallback(async(advisoryId,e)=>{
    if(e)e.stopPropagation();
    if(!userName.trim()){alert("Please set your name in Settings first.");return;}
    setAckingId(advisoryId);
    try{
      const res=await fetch(`${PROXY_URL}/ack/${encodeURIComponent(advisoryId)}`,{
        method:"DELETE",headers:{"Content-Type":"application/json",...getAuthHeader()},
        body:JSON.stringify({by:userName.trim()})});
      if(res.ok){setAcks(p=>{const n={...p};delete n[advisoryId];return n;});}
      else{const d=await res.json();alert(d.error||"Cannot undo — you can only undo your own acknowledgments.");}
    }catch(err){console.error("Unack failed",err);}
    setAckingId(null);
  },[userName]);

  // Fix 8: Assignment
  const handleAssign=useCallback(async(advisoryId,assignTo,e)=>{
    if(e)e.stopPropagation();
    if(!userName.trim()){alert("Please set your name in Settings first.");return;}
    const existing=acks[advisoryId]||{};
    try{
      const res=await fetch(`${PROXY_URL}/ack`,{method:"POST",headers:{"Content-Type":"application/json",...getAuthHeader()},
        body:JSON.stringify({id:advisoryId,by:existing.by||userName.trim(),note:existing.note||"",
          status:statuses[advisoryId]||"In Review",assigned_to:assignTo,ai_triage:aiTriageResults[advisoryId]||""})});
      const data=await res.json();
      if(data.success||data.persisted!==false){
        setAcks(p=>({...p,[advisoryId]:{...existing,assigned_to:assignTo,by:existing.by||userName.trim(),at:existing.at||new Date().toISOString()}}));
        setStatuses(p=>({...p,[advisoryId]:p[advisoryId]||"In Review"}));
      }
    }catch(err){console.error("Assign failed",err);}
    setShowAssignModal(null);
  },[userName,acks,statuses,aiTriageResults]);

  // Fix 9: AI Triage
  const runAITriage=useCallback(async(advisory,e)=>{
    if(e)e.stopPropagation();
    const apiKey=localStorage.getItem("sad_apikey")||"";
    if(!apiKey){alert("Add your Anthropic API key in Settings → AI Triage Key first.");setTab("settings");return;}
    setTriageLoading(t=>({...t,[advisory.id]:true}));
    try{
      const prompt=`You are a SOC analyst. In ONE sentence (max 20 words), give the single most critical immediate action for this security advisory:\n[${advisory.severity}] ${advisory.id} — ${advisory.title} (${advisory.vendor||advisory.source}, CVSS: ${advisory.cvss||"N/A"}): ${(advisory.summary||"").slice(0,300)}\nRespond with ONLY the action sentence, no preamble.`;
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:80,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      if(data.error){alert("AI error: "+data.error.message);return;}
      const triage=(data.content||[]).map(b=>b.text||"").join("").trim();
      if(triage){
        setAiTriageResults(r=>({...r,[advisory.id]:triage}));
        const existing=acks[advisory.id]||{};
        fetch(`${PROXY_URL}/ack`,{method:"POST",headers:{"Content-Type":"application/json",...getAuthHeader()},
          body:JSON.stringify({id:advisory.id,by:existing.by||userName||"System",note:existing.note||"",
            status:statuses[advisory.id]||"New",assigned_to:existing.assigned_to||"",ai_triage:triage})
        }).catch(()=>{});
      }
    }catch(ex){console.error("AI triage error:",ex);}
    setTriageLoading(t=>({...t,[advisory.id]:false}));
  },[userName,acks,statuses]);

  const sendNotification=useCallback((items)=>{
    if(!notifEnabled||notifPerm!=="granted"||!items.length)return;
    const crit=items.filter(a=>a.severity==="Critical"||a.zeroDay);
    if(!crit.length)return;
    try{new Notification(`🛡️ ${crit.length} Critical/Zero-Day Alert${crit.length>1?"s":""}`,{body:crit.slice(0,3).map(a=>`${a.zeroDay?"[0-DAY] ":""}${a.id}: ${a.title}`).join("\n")});}catch(e){}
  },[notifEnabled,notifPerm]);

  const doRefresh=useCallback(async(manual=false)=>{
    setFLoad(true);
    if(PROXY_URL){
      try{
        const res=await fetch(`${PROXY_URL}/advisories${manual?"?force=true":""}`,{headers:{"Content-Type":"application/json",...getAuthHeader()}});
        if(!res.ok)throw new Error("Proxy returned "+res.status);
        const data=await res.json();
        if(data.advisories?.length){
          const incoming=data.advisories.filter(a=>a&&a.id);
          // P1: replace state — diff against current ids to detect new ones
          setAdvisories(prev=>{
            const prevIds=new Set(prev.map(a=>a.id));
            const marked=incoming.map(a=>({...a,isNew:!prevIds.has(a.id)}));
            const newCount=marked.filter(a=>a.isNew).length;
            if(newCount>0){setNewCount(c=>c+newCount);sendNotification(marked.filter(a=>a.isNew));}
            return marked; // replace entirely — no accumulation
          });
          setLastFetchedTs(Date.now());
        }
      }catch(err){console.error("Proxy error:",err.message);}
    }
    const now=new Date();
    const ts=now.toLocaleString("en-GB",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
    setLastFetched(ts);
    setNextRefresh(Date.now()+INTERVALS[refreshInterval]);
    setRefreshLog(prev=>[{time:ts,manual,live:!!PROXY_URL},...prev].slice(0,20));
    setFLoad(false);
  },[refreshInterval,sendNotification]);

  useEffect(()=>{
    if(timerRef.current)clearInterval(timerRef.current);
    if(!autoRefresh)return;
    const ms=INTERVALS[refreshInterval];
    setNextRefresh(Date.now()+ms);
    timerRef.current=setInterval(()=>doRefresh(false),ms);
    return()=>clearInterval(timerRef.current);
  },[autoRefresh,refreshInterval]);

  useEffect(()=>{
    if(!PROXY_URL)return;
    fetch(`${PROXY_URL}/health`).then(r=>r.json()).then(d=>console.log("✅ Proxy v2:",d.sources,"sources")).catch(()=>console.warn("⚠️ Proxy unreachable"));
  },[]);

  const timeToCron=(time,tz)=>{const[h,m]=time.split(":").map(Number);const offsets={"UTC":0,"IST":-5.5,"EST":5,"CST":6,"MST":7,"PST":8,"CET":-1,"AEST":-10};const offset=offsets[tz]||0;const utcH=((h+offset)%24+24)%24;return`${m} ${Math.floor(utcH)} * * *`;};

  const sendEmailNow=useCallback(async()=>{
    if(!emailRecipients.length){alert("Add at least one recipient first.");return;}
    setEmailSending(true);setEmailStatus(null);
    try{
      const res=await fetch(`${PROXY_URL}/email-digest`,{method:"POST",headers:{"Content-Type":"application/json",...getAuthHeader()},body:JSON.stringify({to:emailRecipients[0],from:senderEmail,senderName})});
      const data=await res.json();
      if(!res.ok)throw new Error(data.error||"Send failed");
      setEmailStatus({ok:true,msg:`✅ Digest sent to ${emailRecipients.join(", ")}`});
    }catch(e){setEmailStatus({ok:false,msg:"❌ "+e.message});}
    setEmailSending(false);
  },[emailRecipients,senderEmail,senderName]);

  const saveSchedule=useCallback(async(enabled)=>{
    if(enabled&&!emailRecipients.length){alert("Add at least one recipient first.");return;}
    setScheduleStatus(null);
    try{
      const cronExpr=timeToCron(digestTime,digestTZ);
      const res=await fetch(`${PROXY_URL}/email-digest`,{method:"POST",headers:{"Content-Type":"application/json",...getAuthHeader()},body:JSON.stringify({to:emailRecipients[0],from:senderEmail,senderName,schedule:enabled,cronExpr})});
      const data=await res.json();
      if(!res.ok)throw new Error(data.error||"Schedule failed");
      setScheduleEnabled(enabled);
      setScheduleStatus({ok:true,msg:enabled?`✅ Scheduled daily at ${digestTime} ${digestTZ}`:"✅ Schedule disabled"});
    }catch(e){setScheduleStatus({ok:false,msg:"❌ "+e.message});}
  },[digestTime,digestTZ,emailRecipients,senderEmail,senderName]);

  const requestNotifPerm=async()=>{if(typeof Notification==="undefined")return;const p=await Notification.requestPermission();setNotifPerm(p);if(p==="granted")setNotifEnabled(true);};

  const exportCSV=()=>{
    const h=["ID","Vendor","Category","Title","Severity","CVSS","Published","ZeroDay","Status","AcknowledgedBy","URL"];
    const rows=advisories.map(a=>[a.id,a.vendor||a.source,a.cat||"",`"${(a.title||"").replace(/"/g,'""')}"`,a.severity,a.cvss||"",a.published||a.date,a.zeroDay?"Yes":"No",statuses[a.id]||"",acks[a.id]?.by||"",a.url]);
    const csv=[h,...rows].map(r=>r.join(",")).join("\n");
    const b=new Blob([csv],{type:"text/csv"});const u=URL.createObjectURL(b);const l=document.createElement("a");l.href=u;l.download="security_advisories.csv";l.click();URL.revokeObjectURL(u);
  };

  const toggleSrc=id=>setSources(s=>s.map(x=>x.id===id?{...x,enabled:!x.enabled}:x));
  const removeSrc=id=>setSources(s=>s.filter(x=>x.id!==id));
  const addSrc=()=>{if(!newSrc.name||!newSrc.vendor)return;setSources(s=>[...s,{...newSrc,id:Date.now().toString(),tier:3,enabled:true}]);setNewSrc({name:"",vendor:"",cat:"Your Stack",rss:"",url:""});setAddOpen(false);};

  // clearNew — decoupled from fNew
  const clearNew=()=>{setAdvisories(p=>p.map(a=>({...a,isNew:false})));setNewCount(0);setFNew(false);};

  const sendTeamsNow=useCallback(async()=>{
    if(!teamsWebhook.trim()){setTeamsStatus({ok:false,msg:"❌ Enter Teams webhook URL."});return;}
    setTeamsSending(true);setTeamsStatus(null);
    try{
      const res=await fetch(`${PROXY_URL}/teams-notify`,{method:"POST",headers:{"Content-Type":"application/json",...getAuthHeader()},body:JSON.stringify({webhookUrl:teamsWebhook.trim()})});
      const data=await res.json();
      if(!res.ok)throw new Error(data.error||"Send failed");
      setTeamsStatus({ok:true,msg:`✅ Teams notification sent — ${data.critical} critical, ${data.zeroDays} zero-days`});
    }catch(e){setTeamsStatus({ok:false,msg:"❌ "+e.message});}
    setTeamsSending(false);
  },[teamsWebhook]);

  const vendors=useMemo(()=>["All",...Array.from(new Set(advisories.map(a=>a.vendor||a.source).filter(Boolean)))].sort(),[advisories]);
  const cats=useMemo(()=>["All",...Array.from(new Set(advisories.map(a=>a.cat).filter(Boolean)))].sort(),[advisories]);
  const nowTs=new Date();
  const dateRanges={"all":null,"today":1,"7d":7,"30d":30,"90d":90};

  // P7+P8: Memoize filtered — only recomputes when advisories or filters change, not on every timer tick
  const filtered=useMemo(()=>advisories.filter(a=>{
    if(fSev!=="All"&&a.severity!==fSev)return false;
    if(fVen!=="All"&&(a.vendor||a.source)!==fVen)return false;
    if(fCat!=="All"&&a.cat!==fCat)return false;
    if(fZD&&!a.zeroDay)return false;
    if(fNew){
      const aTs=new Date(a.published||a.date||0).getTime();
      if(lastFetchedTs===0?!a.isNew:aTs<lastFetchedTs-3600000)return false;
    }
    if(fAck==="Acknowledged"&&!acks[a.id])return false;
    if(fAck==="Unacknowledged"&&acks[a.id])return false;
    if(fStatus!=="All"&&(statuses[a.id]||"New")!==fStatus)return false;
    if(search&&![a.title,a.id,a.vendor,a.source,a.summary].some(f=>f?.toLowerCase().includes(search.toLowerCase())))return false;
    if(fDateRange!=="all"&&fDateRange!=="custom"){
      const days=dateRanges[fDateRange];
      if(days){const cutoff=new Date(nowTs-days*86400000);const d=new Date(a.published||a.date);if(isNaN(d)||d<cutoff)return false;}
    }
    if(fDateRange==="custom"){
      if(fDateFrom){const d=new Date(a.published||a.date);if(isNaN(d)||d<new Date(fDateFrom))return false;}
      if(fDateTo){const d=new Date(a.published||a.date);if(isNaN(d)||d>new Date(fDateTo+"T23:59:59"))return false;}
    }
    return true;
  }),[advisories,fSev,fVen,fCat,fZD,fNew,fAck,fStatus,search,fDateRange,fDateFrom,fDateTo,lastFetchedTs,acks,statuses]);

  // P5: pagination — only render first N cards
  const [visibleCount,setVisibleCount]=useState(50);
  // Reset pagination when filters change
  useEffect(()=>{setVisibleCount(50);},[fSev,fVen,fCat,fZD,fNew,fAck,fStatus,search,fDateRange,fDateFrom,fDateTo]);

  const filteredSources=sources.filter(s=>(srcCat==="All"||s.cat===srcCat)&&(!srcSearch||[s.name,s.vendor].some(f=>f?.toLowerCase().includes(srcSearch.toLowerCase()))));

  // P7: Memoize stats — no more 6x full-scan on every render
  const stats=useMemo(()=>({
    critical:advisories.filter(a=>a.severity==="Critical").length,
    high:advisories.filter(a=>a.severity==="High").length,
    medium:advisories.filter(a=>a.severity==="Medium").length,
    low:advisories.filter(a=>a.severity==="Low").length,
    zeroDay:advisories.filter(a=>a.zeroDay).length,
    total:advisories.length,
    newItems:advisories.filter(a=>a.isNew).length,
    slaOverdue:advisories.filter(a=>{const s=slaStatus(a);return s&&s.overdue;}).length,
  }),[advisories]);
  const srcStats={total:sources.length,enabled:sources.filter(s=>s.enabled).length,withRSS:sources.filter(s=>s.rss&&s.enabled).length};
  const inp=ex=>({background:D,color:T,border:`1px solid ${B}`,borderRadius:6,padding:"7px 10px",...ex});
  const tabBtn=(t,label,badge)=>(
    <button onClick={()=>setTab(t)} style={{padding:"8px 16px",border:"none",borderRadius:6,cursor:"pointer",fontWeight:600,fontSize:13,background:tab===t?A:"transparent",color:tab===t?"#fff":M,position:"relative"}}>
      {label}{badge>0&&<span style={{position:"absolute",top:2,right:2,background:"#ff4444",color:"#fff",borderRadius:8,fontSize:10,padding:"1px 5px",fontWeight:700}}>{badge}</span>}
    </button>
  );

  // P6: Isolated countdown — has its own 1-second timer, won't re-render Dashboard
  function CountdownTimer({nextRefresh,autoRefresh}){
    const [now,setNow]=useState(Date.now());
    useEffect(()=>{
      const t=setInterval(()=>setNow(Date.now()),1000);
      return()=>clearInterval(t);
    },[]);
    if(!autoRefresh||!nextRefresh)return <span style={{color:M}}> · Paused</span>;
    const d=Math.max(0,nextRefresh-now);
    const h=Math.floor(d/3600000);
    const m=Math.floor((d%3600000)/60000);
    const s=Math.floor((d%60000)/1000);
    return <span style={{color:M}}> · {h}h {String(m).padStart(2,"0")}m {String(s).padStart(2,"0")}s</span>;
  }

  return(
    <div style={{background:D,color:T,minHeight:"100vh"}}>
      {/* HEADER */}
      <div style={{background:C,borderBottom:`1px solid ${B}`,padding:"12px 20px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <span style={{fontSize:22}}>🛡️</span>
        <div>
          <div style={{fontWeight:700,fontSize:15}}>Security Advisory Dashboard</div>
          <div style={{color:M,fontSize:11}}>SOC Intelligence · {srcStats.enabled} Active Sources · 86 sources configured</div>
        </div>
        <div style={{background:"#21262d",border:`1px solid ${B}`,borderRadius:20,padding:"4px 12px",fontSize:12,display:"flex",alignItems:"center",gap:4}}>
          {autoRefresh?<span className="live-dot"/>:<span className="paused-dot"/>}
          <span style={{color:autoRefresh?"#00aa00":M}}>{autoRefresh?"Live":"Paused"}</span>
          <CountdownTimer nextRefresh={nextRefresh} autoRefresh={autoRefresh}/>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={exportCSV} style={{...inp(),cursor:"pointer",fontSize:12,fontWeight:600,padding:"7px 12px"}}>⬇ CSV</button>
          <button onClick={()=>doRefresh(true)} disabled={fLoad} style={{background:"#21262d",color:T,border:`1px solid ${B}`,borderRadius:6,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>{fLoad?"⟳ Fetching...":"⟳ Refresh Now"}</button>
          <button onClick={onLogout} style={{background:"#21262d",color:"#ff6b6b",border:"1px solid #ff444444",borderRadius:6,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>🔓 Sign Out</button>
        </div>
      </div>

      {/* STATS */}
      <div style={{display:"flex",gap:8,padding:"10px 20px",flexWrap:"wrap"}}>
        {[["Total",stats.total,M],["Critical",stats.critical,"#ff4444"],["High",stats.high,"#ff7700"],["Medium",stats.medium,"#e6b800"],["Low",stats.low,"#00aa00"],["Zero-Days",stats.zeroDay,"#cc00cc"],["New",stats.newItems,"#1f6feb"],["SLA Overdue",stats.slaOverdue,"#ff4444"],["Sources",srcStats.enabled,"#8b949e"]].map(([l,v,c])=>(
          <div key={l} onClick={l==="New"&&v>0?()=>{setFNew(true);setTab("feed");}:undefined}
            style={{background:C,border:`1px solid ${l==="New"&&v>0?"#1f6feb":l==="SLA Overdue"&&v>0?"#ff4444":B}`,borderRadius:8,padding:"7px 14px",textAlign:"center",minWidth:68,cursor:l==="New"&&v>0?"pointer":"default"}}>
            <div style={{fontSize:18,fontWeight:700,color:v>0?c:M}}>{fLoad&&v===0?"…":v}</div><div style={{fontSize:11,color:M}}>{l}</div>
          </div>
        ))}
        <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:"7px 14px",marginLeft:"auto",textAlign:"right"}}>
          <div style={{fontSize:11,color:M}}>Last Fetched</div><div style={{fontSize:12}}>{lastFetched||"Never"}</div>
        </div>
      </div>

      {/* NEW BANNER */}
      {newCount>0&&(
        <div style={{margin:"0 20px 10px",background:"#0d1f3c",border:"1px solid #1f6feb",borderRadius:8,padding:"10px 16px",display:"flex",alignItems:"center",gap:10}} className="new-badge">
          <span style={{fontSize:18}}>🔔</span>
          <span style={{flex:1}}><strong style={{color:"#58a6ff"}}>{newCount} new {newCount>1?"advisories":"advisory"}</strong> detected</span>
          <button onClick={()=>{setFNew(true);setTab("feed");}} style={{background:A,color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>View New</button>
          <button onClick={()=>{setFNew(false);clearNew();}} style={{background:"none",border:`1px solid ${B}`,color:M,borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12}}>Dismiss</button>
        </div>
      )}

      {/* TABS */}
      <div style={{padding:"0 20px 10px",display:"flex",gap:4,flexWrap:"wrap"}}>
        {tabBtn("feed","📋 Advisory Feed",stats.newItems)}
        {tabBtn("sources","📡 Sources ("+srcStats.enabled+")",0)}
        {tabBtn("autorefresh","🔄 Auto-Refresh",0)}
        {tabBtn("email","📧 Email Digest",0)}
        {tabBtn("settings","🔑 Settings",0)}
      </div>

      <div style={{padding:"0 20px 24px"}}>

        {/* ── FEED ── */}
        {tab==="feed"&&(
          <div>
            {/* Filter row 1 */}
            <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
              <input placeholder="🔍 Search ID, title, vendor..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp({flex:1,minWidth:150})}}/>
              <select value={fSev} onChange={e=>setFSev(e.target.value)} style={inp()}>{["All","Critical","High","Medium","Low","Unknown"].map(s=><option key={s}>{s}</option>)}</select>
              <select value={fVen} onChange={e=>setFVen(e.target.value)} style={inp()}>{vendors.map(v=><option key={v}>{v}</option>)}</select>
              <select value={fCat} onChange={e=>setFCat(e.target.value)} style={inp()}>{cats.map(c=><option key={c}>{c}</option>)}</select>
              <select value={fAck} onChange={e=>setFAck(e.target.value)} style={inp()}>
                <option value="All">All Ack</option>
                <option value="Acknowledged">✅ Acknowledged</option>
                <option value="Unacknowledged">⬜ Unacknowledged</option>
              </select>
              <select value={fStatus} onChange={e=>setFStatus(e.target.value)} style={inp()}>
                <option value="All">All Status</option>
                {STATUS_OPTIONS.map(s=><option key={s}>{s}</option>)}
              </select>
              <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",color:M,whiteSpace:"nowrap"}}><input type="checkbox" checked={fZD} onChange={e=>setFZD(e.target.checked)}/> 0-Day</label>
              <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",color:fNew?"#58a6ff":M,whiteSpace:"nowrap"}}><input type="checkbox" checked={fNew} onChange={e=>setFNew(e.target.checked)}/> New</label>
            </div>
            {/* Date filter */}
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{color:M,fontSize:12,whiteSpace:"nowrap"}}>📅 Date:</span>
              {[["all","All Time"],["today","Today"],["7d","Last 7 Days"],["30d","Last 30 Days"],["90d","Last 90 Days"],["custom","Custom Range"]].map(([val,label])=>(
                <button key={val} onClick={()=>setFDateRange(val)}
                  style={{background:fDateRange===val?A:"#21262d",color:fDateRange===val?"#fff":M,border:`1px solid ${fDateRange===val?A:B}`,borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12,fontWeight:fDateRange===val?600:400}}>
                  {label}
                </button>
              ))}
              {fDateRange==="custom"&&(<>
                <input type="date" value={fDateFrom} onChange={e=>setFDateFrom(e.target.value)} style={{...inp({fontSize:12})}}/>
                <span style={{color:M,fontSize:12}}>→</span>
                <input type="date" value={fDateTo} onChange={e=>setFDateTo(e.target.value)} style={{...inp({fontSize:12})}}/>
              </>)}
              <span style={{color:M,fontSize:12,marginLeft:"auto"}}>{filtered.length} results</span>
            </div>

            {/* Advisory cards — P5: paginated render */}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {fLoad&&advisories.length===0&&(
                <div style={{color:M,textAlign:"center",padding:60,fontSize:14}}>
                  <div style={{fontSize:28,marginBottom:12}}>⟳</div>
                  Loading advisories from proxy…
                </div>
              )}
              {filtered.slice(0,visibleCount).map(a=>{
                const c=SEV[a.severity]||SEV.Unknown;
                const open=sel===a.id;
                const cc=CAT_COLORS[a.cat]||"#888";
                const ackInfo=acks[a.id];
                const statusVal=statuses[a.id];
                const isMyAck=ackInfo&&ackInfo.by===userName;
                return(
                  <div key={a.id} onClick={()=>setSel(open?null:a.id)}
                    style={{background:ackInfo?"#0a1a0a":a.isNew?"#0d1f3c":C,
                      border:`1px solid ${ackInfo?"#16a34a":a.isNew?"#1f6feb":a.zeroDay?"#cc00cc":c.border}`,
                      borderLeft:`4px solid ${ackInfo?"#16a34a":a.isOEM?"#4ade80":a.isNew?"#1f6feb":a.zeroDay?"#cc00cc":c.badge}`,
                      borderRadius:8,padding:"12px 14px",cursor:"pointer"}}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:4}}>
                          <SevBadge sev={a.severity}/>
                          {a.zeroDay&&<ZDBadge/>}
                          {a.isNew&&!ackInfo&&<NewBadge/>}
                          {a.isOEM&&<OEMBadge/>}
                          <SourceCountBadge count={a.source_count} sources={a.sources_list}/>
                          <SLABadge advisory={a}/>
                          {ackInfo&&<AckBadge by={ackInfo.by} at={ackInfo.at} note={ackInfo.note}/>}
                          {statusVal&&statusVal!=="New"&&<StatusBadge status={statusVal}/>}
                          {ackInfo?.assigned_to&&ackInfo.assigned_to!=="Unassigned"&&<span style={{background:"#1f6feb15",color:"#58a6ff",border:"1px solid #1f6feb44",borderRadius:4,padding:"1px 7px",fontSize:10,fontWeight:600,marginLeft:4}}>👤 {ackInfo.assigned_to}</span>}
                          {a.cat&&<span style={{background:cc+"22",color:cc,border:`1px solid ${cc}44`,borderRadius:4,padding:"1px 7px",fontSize:11}}>{a.cat}</span>}
                          <span style={{color:M,fontSize:12}}>{a.vendor||a.source}</span>
                          <span style={{color:B}}>·</span>
                          <span style={{color:M,fontSize:12}}>{fmtTs(a.published||a.date)}</span>
                          {a.cvss&&<span style={{color:c.text,fontSize:12,fontWeight:700}}>CVSS {a.cvss}</span>}
                        </div>
                        <div style={{fontWeight:600,marginBottom:3,fontSize:13}}>{a.id} — {a.title}</div>
                        <div style={{color:M,fontSize:12,lineHeight:1.5}}>{(a.summary||"").slice(0,200)}{(a.summary||"").length>200?"...":""}</div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
                        {/* Status dropdown */}
                        <select value={statusVal||"New"} onClick={e=>e.stopPropagation()}
                          onChange={e=>{e.stopPropagation();setStatuses(p=>({...p,[a.id]:e.target.value}));}}
                          style={{background:"#21262d",color:STATUS_COLORS[statusVal||"New"]||M,border:`1px solid ${B}`,borderRadius:4,padding:"2px 6px",cursor:"pointer",fontSize:11,fontWeight:600}}>
                          {STATUS_OPTIONS.map(s=><option key={s} value={s}>{s}</option>)}
                        </select>
                        {/* Acknowledge button */}
                        {ackInfo?(
                          isMyAck?(
                            <button onClick={e=>handleUnack(a.id,e)} disabled={ackingId===a.id}
                              style={{background:"#0a2a0a",color:"#4ade80",border:"1px solid #16a34a",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>
                              {ackingId===a.id?"...":"✓ Ack'd · Undo"}
                            </button>
                          ):(
                            <span style={{color:"#4ade80",fontSize:11,fontWeight:600}}>✓ Ack'd</span>
                          )
                        ):(
                          showAckInput===a.id?(
                            <div style={{display:"flex",gap:4}} onClick={e=>e.stopPropagation()}>
                              <input placeholder="Note (optional)" value={ackNote} onChange={e=>setAckNote(e.target.value)}
                                style={{...inp({fontSize:11,padding:"3px 8px",width:140})}} autoFocus
                                onKeyDown={e=>{if(e.key==="Enter")handleAck(a.id,ackNote,null);if(e.key==="Escape"){setShowAckInput(null);setAckNote("");}}}/>
                              <button onClick={e=>{e.stopPropagation();handleAck(a.id,ackNote,null);}}
                                style={{background:"#16a34a",color:"#fff",border:"none",borderRadius:4,padding:"3px 8px",cursor:"pointer",fontSize:11,fontWeight:600}}>✓</button>
                              <button onClick={e=>{e.stopPropagation();setShowAckInput(null);setAckNote("");}}
                                style={{background:"#21262d",color:M,border:`1px solid ${B}`,borderRadius:4,padding:"3px 6px",cursor:"pointer",fontSize:11}}>✕</button>
                            </div>
                          ):(
                            <button onClick={e=>{e.stopPropagation();setShowAckInput(a.id);setAckNote("");}} disabled={ackingId===a.id}
                              style={{background:"#21262d",color:M,border:`1px solid ${B}`,borderRadius:6,padding:"3px 10px",cursor:"pointer",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>
                              Acknowledge
                            </button>
                          )
                        )}
                        <span style={{color:M,fontSize:12}}>{open?"▲":"▼"}</span>
                      </div>
                    </div>

                    {/* Expanded detail */}
                    {open&&(
                      <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${B}`}} onClick={e=>e.stopPropagation()}>
                        {/* Ack note if present */}
                        {ackInfo?.note&&(
                          <div style={{background:"#0a2a0a",border:"1px solid #16a34a",borderRadius:6,padding:"8px 12px",marginBottom:8,fontSize:12,color:"#4ade80"}}>
                            📝 Note: {ackInfo.note}
                          </div>
                        )}
                        {/* AI Triage result */}
                        {(aiTriageResults[a.id]||ackInfo?.ai_triage)&&(
                          <div style={{background:"#1f6feb12",border:"1px solid #1f6feb44",borderRadius:6,padding:"8px 12px",marginBottom:8,fontSize:12,color:"#58a6ff"}}>
                            🤖 <strong>AI Triage:</strong> {aiTriageResults[a.id]||ackInfo?.ai_triage}
                          </div>
                        )}
                        {/* SLA info */}
                        {(()=>{const s=slaStatus(a);if(!s)return null;return(
                          <div style={{marginBottom:8,fontSize:12,color:s.overdue?"#ff4444":s.urgent?"#ff8800":"#8b949e"}}>
                            ⏱ SLA: <strong>{SLA_HOURS[a.severity]}h</strong> limit for {a.severity} —{" "}
                            {s.overdue?<span style={{color:"#ff4444",fontWeight:700}}>{s.remainH}h overdue ⚠</span>:<span>{s.remainH}h remaining</span>}
                          </div>
                        );})()}
                        {/* CVE IDs */}
                        {(a.cves?.length>0||a.cve)&&(
                          <div style={{marginBottom:8,display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
                            <span style={{color:M,fontSize:12}}>CVE IDs:</span>
                            {(a.cves||[a.cve]).filter(Boolean).map(cve=>(
                              <a key={cve} href={`https://nvd.nist.gov/vuln/detail/${cve}`} target="_blank" rel="noreferrer"
                                style={{background:"#0d2137",color:"#58a6ff",border:"1px solid #1f6feb44",borderRadius:4,padding:"2px 8px",fontSize:12,fontWeight:700,textDecoration:"none"}}>
                                {cve}
                              </a>
                            ))}
                          </div>
                        )}
                        {/* CVSS */}
                        {a.cvss&&(
                          <div style={{marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
                            <span style={{color:M,fontSize:12}}>CVSS Score:</span>
                            <span style={{background:(SEV[a.severity]||SEV.Unknown).badge,color:"#fff",borderRadius:4,padding:"2px 10px",fontSize:12,fontWeight:700}}>
                              {a.cvss} / 10 — {a.severity}
                            </span>
                            {a.cvss>=9&&<span style={{color:"#ff4444",fontSize:11,fontWeight:600}}>⚠ PATCH IMMEDIATELY</span>}
                            {a.cvss>=7&&a.cvss<9&&<span style={{color:"#ff7700",fontSize:11,fontWeight:600}}>⚠ HIGH PRIORITY</span>}
                          </div>
                        )}
                        {/* Description */}
                        {(a.description||a.summary)&&(
                          <div style={{marginBottom:8}}>
                            <div style={{color:M,fontSize:12,marginBottom:4}}>Description:</div>
                            <div style={{background:D,borderRadius:6,padding:"10px 12px",fontSize:12,color:T,lineHeight:1.6,maxHeight:160,overflowY:"auto",border:`1px solid ${B}`}}>
                              {a.description&&a.description.length>(a.summary||"").length?a.description:a.summary}
                            </div>
                          </div>
                        )}
                        {/* Products */}
                        {a.products?.length>0&&(
                          <div style={{marginBottom:8}}>

                              {a.products.map(p=><span key={p} style={{background:"#21262d",border:`1px solid ${B}`,borderRadius:4,padding:"2px 8px",fontSize:12}}>{p}</span>)}

                          <div style={{marginBottom:8,display:"flex",flexWrap:"wrap",gap:4,alignItems:"center"}}>
                            <span style={{color:M,fontSize:12,marginRight:2}}>Tags:</span>

                        {/* Meta row */}
                        <div style={{display:"flex",flexWrap:"wrap",gap:16,marginBottom:8,fontSize:12,color:M}}>
                          <span>📡 Source: <strong style={{color:T}}>{a.source||a.vendor}</strong>{a.isOEM&&<span style={{color:"#4ade80",fontSize:10,marginLeft:4}}>[OEM Direct]</span>}</span>
                          {a.author&&<span>✍ Author: <strong style={{color:T}}>{a.author}</strong></span>}
                          <span>📅 Published: <strong style={{color:T}}>{fmtTs(a.published||a.date)}</strong></span>
                        </div>
                        {/* Action buttons */}
                        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>
                          <a href={a.url||a.link} target="_blank" rel="noreferrer"
                            style={{background:A,color:"#fff",borderRadius:6,padding:"6px 14px",fontSize:13,fontWeight:600,textDecoration:"none"}}>
                            🔗 View Official Advisory
                          </a>
                          {a.cve&&<a href={`https://nvd.nist.gov/vuln/detail/${a.cve}`} target="_blank" rel="noreferrer"
                            style={{background:"#21262d",color:T,border:`1px solid ${B}`,borderRadius:6,padding:"6px 14px",fontSize:13,textDecoration:"none"}}>🔍 NVD</a>}
                          {a.cve&&<a href={`https://www.exploit-db.com/search?cve=${a.cve}`} target="_blank" rel="noreferrer"
                            style={{background:"#21262d",color:T,border:`1px solid ${B}`,borderRadius:6,padding:"6px 14px",fontSize:13,textDecoration:"none"}}>💣 Exploit-DB</a>}

                          <button onClick={e=>{e.stopPropagation();setShowAssignModal(showAssignModal===a.id?null:a.id);}}
                            style={{background:"#21262d",color:T,border:`1px solid ${B}`,borderRadius:6,padding:"6px 14px",fontSize:13,cursor:"pointer"}}>

                              style={{background:triageLoading[a.id]?"#21262d":"#1f6feb22",color:"#58a6ff",border:"1px solid #1f6feb44",borderRadius:6,padding:"6px 14px",fontSize:13,cursor:"pointer",opacity:triageLoading[a.id]?0.6:1}}>
                              {triageLoading[a.id]?"🤖 Analyzing…":"🤖 AI Triage"}
                            </button>
                          )}
                        </div>
                        {/* Assign team member inline panel */}
                        {showAssignModal===a.id&&(
                          <div style={{marginTop:8,background:D,border:`1px solid ${B}`,borderRadius:8,padding:"12px 14px"}} onClick={e=>e.stopPropagation()}>

                            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                              {TEAM_MEMBERS.map(m=>(
                                <button key={m} onClick={e=>handleAssign(a.id,m,e)}
                                  style={{background:(ackInfo?.assigned_to||"Unassigned")===m?A:"#21262d",
                                    color:(ackInfo?.assigned_to||"Unassigned")===m?"#fff":M,
                                    border:`1px solid ${(ackInfo?.assigned_to||"Unassigned")===m?A:B}`,
                                    borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer"}}>
                                  {m==="Unassigned"?"— Unassign":m}
                                </button>

                            </div>
                          </div>

              {/* P5: Load More button */}
              {filtered.length>visibleCount&&(

                </div>
              )}
              {!fLoad&&filtered.length===0&&advisories.length>0&&<div style={{color:M,textAlign:"center",padding:40}}>No advisories match current filters.</div>}
              {!fLoad&&advisories.length===0&&<div style={{color:M,textAlign:"center",padding:40}}>No advisories loaded yet.</div>}
            </div>
          </div>
        )}

        {/* ── SOURCES ── */}
        {tab==="sources"&&(
          <div>
            <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
              {[["Total",srcStats.total,"#8b949e"],["Active",srcStats.enabled,"#00aa00"],["With RSS",srcStats.withRSS,"#1f6feb"]].map(([l,v,c])=>(
                <div key={l} style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:"8px 16px",textAlign:"center",minWidth:90}}>
                  <div style={{fontSize:18,fontWeight:700,color:c}}>{v}</div><div style={{fontSize:11,color:M}}>{l}</div>
                </div>

              <div style={{marginLeft:"auto"}}><button onClick={()=>setAddOpen(true)} style={{background:A,color:"#fff",border:"none",borderRadius:6,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:600}}>+ Add Custom</button></div>
            </div>
            <div style={{background:"#1a1208",border:"1px solid #ff6b35",borderRadius:8,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:24}}>🌐</span>
              <div>
                <div style={{fontWeight:700,color:"#ff6b35",fontSize:13}}>OEM Tier 1 Sources Active</div>
                <div style={{color:M,fontSize:12,marginTop:2}}>Direct vendor PSIRT/advisory feeds are prioritised — shown first in feed with green left border and OEM badge.</div>
              </div>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{color:M,fontSize:12,marginBottom:8}}>Toggle by Category:</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {CATEGORIES.map(cat=>{const catSrcs=sources.filter(s=>s.cat===cat);const allOn=catSrcs.every(s=>s.enabled);const cc=CAT_COLORS[cat]||"#888";
                  return(<button key={cat} onClick={()=>setSources(s=>s.map(x=>x.cat===cat?{...x,enabled:!allOn}:x))}
                    style={{background:allOn?cc+"33":"transparent",border:`1px solid ${allOn?cc:B}`,color:allOn?cc:M,borderRadius:20,padding:"4px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>
                    {cat} ({catSrcs.filter(s=>s.enabled).length}/{catSrcs.length})
                  </button>);
                })}
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
              <input placeholder="🔍 Search sources..." value={srcSearch} onChange={e=>setSrcSearch(e.target.value)} style={{...inp({flex:1,minWidth:140})}}/>
              <select value={srcCat} onChange={e=>setSrcCat(e.target.value)} style={inp()}>
                <option value="All">All Categories</option>{CATEGORIES.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            {addOpen&&(
              <div style={{background:C,border:`1px solid ${A}`,borderRadius:8,padding:14,marginBottom:12}}>
                <div style={{fontWeight:600,marginBottom:10}}>Add Custom Source</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <input placeholder="Source name" value={newSrc.name} onChange={e=>setNewSrc(s=>({...s,name:e.target.value}))} style={{...inp({flex:1,minWidth:130})}}/>
                  <input placeholder="Vendor" value={newSrc.vendor} onChange={e=>setNewSrc(s=>({...s,vendor:e.target.value}))} style={{...inp({width:120})}}/>
                  <select value={newSrc.cat} onChange={e=>setNewSrc(s=>({...s,cat:e.target.value}))} style={inp()}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select>
                  <input placeholder="RSS URL" value={newSrc.rss} onChange={e=>setNewSrc(s=>({...s,rss:e.target.value}))} style={{...inp({flex:2,minWidth:180})}}/>
                  <input placeholder="Portal URL" value={newSrc.url} onChange={e=>setNewSrc(s=>({...s,url:e.target.value}))} style={{...inp({flex:1,minWidth:140})}}/>
                </div>
                <div style={{display:"flex",gap:8,marginTop:10}}>
                  <button onClick={addSrc} style={{background:A,color:"#fff",border:"none",borderRadius:6,padding:"7px 14px",cursor:"pointer",fontSize:13}}>Add</button>
                  <button onClick={()=>setAddOpen(false)} style={{background:"#21262d",color:T,border:`1px solid ${B}`,borderRadius:6,padding:"7px 14px",cursor:"pointer",fontSize:13}}>Cancel</button>
                </div>
              </div>
            )}
            {CATEGORIES.filter(cat=>srcCat==="All"||cat===srcCat).map(cat=>{
              const catSrcs=filteredSources.filter(s=>s.cat===cat);
              if(!catSrcs.length)return null;
              const cc=CAT_COLORS[cat]||"#888";
              return(
                <div key={cat} style={{marginBottom:16}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <div style={{width:10,height:10,borderRadius:2,background:cc}}/>
                    <span style={{fontWeight:700,color:cc,fontSize:13}}>{cat}</span>
                    <span style={{color:M,fontSize:12}}>({catSrcs.filter(s=>s.enabled).length}/{catSrcs.length} enabled)</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {catSrcs.map(s=>(

                          <div style={{width:14,height:14,background:"#fff",borderRadius:7,position:"absolute",top:2,left:s.enabled?18:2,transition:"left 0.2s"}}/>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontWeight:600,fontSize:13}}>{s.name}</span>
                            {s.tier===1&&<span style={{background:"#1f6feb22",color:"#58a6ff",border:"1px solid #1f6feb44",borderRadius:3,padding:"1px 5px",fontSize:10}}>T1</span>}
                            {s.tier===2&&<span style={{background:"#88888822",color:M,border:`1px solid ${B}`,borderRadius:3,padding:"1px 5px",fontSize:10}}>T2</span>}

                          <div style={{color:M,fontSize:11,marginTop:1}}>{s.vendor}{s.rss?" · RSS ✓":" · Portal only"}</div>

                        <span style={{background:s.rss?"#00aa0022":"#88888822",color:s.rss?"#00aa00":M,border:`1px solid ${s.rss?"#00aa00":B}`,borderRadius:4,padding:"2px 6px",fontSize:10,flexShrink:0}}>{s.rss?"RSS":"Portal"}</span>

                      </div>
                    ))}
                  </div>
                </div>

          </div>

        {/* ── AUTO-REFRESH ── */}

                  <div style={{color:M,fontSize:12,marginTop:2}}>Monitors {srcStats.withRSS} RSS-enabled sources</div>
                </div>
                <div style={{width:48,height:26,background:autoRefresh?"#00aa00":"#444",borderRadius:13,cursor:"pointer",position:"relative"}} onClick={()=>setAutoRefresh(v=>!v)}>
                  <div style={{width:20,height:20,background:"#fff",borderRadius:10,position:"absolute",top:3,left:autoRefresh?25:3,transition:"left 0.3s"}}/>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                <div style={{background:D,borderRadius:6,padding:"10px 14px"}}><div style={{color:M,fontSize:11,marginBottom:2}}>Last Fetched</div><div style={{fontSize:13,fontWeight:600}}>{lastFetched||"Never"}</div></div>
                <div style={{background:D,borderRadius:6,padding:"10px 14px"}}><div style={{color:M,fontSize:11,marginBottom:2}}>Next Refresh</div><div style={{fontSize:13,fontWeight:600,color:autoRefresh?"#00aa00":M}}>{autoRefresh&&nextRefresh?countdown(nextRefresh):"Paused"}</div></div>
              </div>
              <button onClick={()=>doRefresh(true)} disabled={fLoad} style={{background:A,color:"#fff",border:"none",borderRadius:6,padding:"8px 18px",cursor:"pointer",fontSize:13,fontWeight:600,width:"100%"}}>{fLoad?"⟳ Fetching...":"⟳ Refresh Now"}</button>
            </div>
            <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:20,marginBottom:14}}>
              <div style={{fontWeight:700,marginBottom:12}}>⏱ Refresh Interval</div>

                {Object.entries(INTERVAL_LABELS).map(([k,label])=>(<div key={k} onClick={()=>setRefreshInterval(k)} style={{background:refreshInterval===k?A:D,border:`1px solid ${refreshInterval===k?A:B}`,borderRadius:6,padding:"10px 14px",cursor:"pointer",textAlign:"center",fontWeight:refreshInterval===k?700:400,color:refreshInterval===k?"#fff":T}}>{label}</div>))}
              </div>
            </div>
            <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:20,marginBottom:14}}>
              <div style={{fontWeight:700,marginBottom:4}}>🔔 Browser Notifications</div>
              <div style={{color:M,fontSize:12,marginBottom:12}}>Alert on Critical/Zero-Day detections.</div>
              {notifPerm==="granted"?(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{color:"#00aa00",fontSize:13}}>✓ Notifications permitted</span><div style={{width:40,height:22,background:notifEnabled?"#00aa00":"#444",borderRadius:11,cursor:"pointer",position:"relative"}} onClick={()=>setNotifEnabled(v=>!v)}><div style={{width:16,height:16,background:"#fff",borderRadius:8,position:"absolute",top:3,left:notifEnabled?21:3,transition:"left 0.3s"}}/></div></div>):notifPerm==="denied"?(<div style={{background:"#2d1f1f",border:"1px solid #ff444444",borderRadius:6,padding:"10px 14px",color:"#ff8888",fontSize:12}}>⚠️ Notifications blocked.</div>):(<button onClick={requestNotifPerm} style={{background:A,color:"#fff",border:"none",borderRadius:6,padding:"8px 18px",cursor:"pointer",fontSize:13,fontWeight:600}}>🔔 Enable Notifications</button>)}
            </div>
            <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{fontWeight:700}}>📋 Refresh Log</div><button onClick={()=>setRefreshLog([])} style={{background:"none",border:`1px solid ${B}`,color:M,borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12}}>Clear</button></div>
              {refreshLog.length===0?<div style={{color:M,fontSize:13,textAlign:"center",padding:"16px 0"}}>No history yet.</div>:(
                <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:200,overflowY:"auto"}}>
                  {refreshLog.map((l,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:D,borderRadius:6,padding:"8px 12px"}}>
                    <span style={{color:M,fontSize:12}}>{l.time}</span>
                    <span style={{color:l.count>0?"#00aa00":M,fontSize:12,fontWeight:600}}>{l.count>0?`+${l.count} new`:"No new"}</span>
                    <span style={{background:l.manual?"#1f6feb22":"#00aa0022",color:l.manual?"#58a6ff":"#00aa00",borderRadius:4,padding:"2px 6px",fontSize:11}}>{l.manual?"Manual":"Auto"}</span>
                  </div>))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── EMAIL DIGEST ── */}
        {tab==="email"&&(
          <div style={{maxWidth:580}}>

              </div>
            </div>
            <div style={{background:C,border:`1px solid ${scheduleEnabled?"#00aa00":B}`,borderRadius:8,padding:20,marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div>
                  <div style={{fontWeight:700,fontSize:15}}>⏰ Scheduled Daily Digest</div>
                  <div style={{color:M,fontSize:12,marginTop:2}}>Auto-sends every day at your chosen time</div>
                </div>
                <div style={{width:48,height:26,background:scheduleEnabled?"#00aa00":"#444",borderRadius:13,cursor:"pointer",position:"relative"}} onClick={()=>saveSchedule(!scheduleEnabled)}>
                  <div style={{width:20,height:20,background:"#fff",borderRadius:10,position:"absolute",top:3,left:scheduleEnabled?25:3,transition:"left 0.3s"}}/>
                </div>
              </div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:120}}><div style={{color:M,fontSize:11,marginBottom:4}}>Send Time</div><input type="time" value={digestTime} onChange={e=>setDigestTime(e.target.value)} style={{...inp({width:"100%"})}}/></div>
                <div style={{flex:1,minWidth:120}}><div style={{color:M,fontSize:11,marginBottom:4}}>Timezone</div>
                  <select value={digestTZ} onChange={e=>setDigestTZ(e.target.value)} style={{...inp({width:"100%"})}}>
                    {["UTC","IST","EST","CST","MST","PST","CET","AEST"].map(tz=><option key={tz}>{tz}</option>)}
                  </select>
                </div>
                <div style={{display:"flex",alignItems:"flex-end"}}>
                  <button onClick={()=>saveSchedule(scheduleEnabled)} style={{background:"#21262d",color:T,border:`1px solid ${B}`,borderRadius:6,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:600}}>💾 Save Schedule</button>
                </div>
              </div>
              {scheduleStatus&&<div style={{marginTop:10,padding:"8px 12px",borderRadius:6,background:scheduleStatus.ok?"#1f2d1f":"#2d1f1f",color:scheduleStatus.ok?"#6ea86e":"#ff8888",fontSize:12}}>{scheduleStatus.msg}</div>}
            </div>
            <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:20,marginBottom:14}}>
              <div style={{fontWeight:700,marginBottom:4}}>📤 Send Digest Now</div>
              <div style={{color:M,fontSize:12,marginBottom:14}}>Manually trigger the digest — fetches latest advisories and emails the distribution list.</div>
              <button onClick={sendEmailNow} disabled={emailSending||!emailRecipients.length}
                style={{background:emailRecipients.length?A:"#333",color:"#fff",border:"none",borderRadius:6,padding:"10px 24px",cursor:emailRecipients.length?"pointer":"not-allowed",fontSize:14,fontWeight:600,width:"100%"}}>
                {emailSending?"⟳ Sending...":"📧 Send Digest Now"}
              </button>
              {emailStatus&&<div style={{marginTop:12,padding:"10px 14px",borderRadius:6,background:emailStatus.ok?"#1f2d1f":"#2d1f1f",color:emailStatus.ok?"#6ea86e":"#ff8888",fontSize:13}}>{emailStatus.msg}</div>}
            </div>
            <div style={{background:C,border:"1px solid #6264a7",borderRadius:8,padding:20}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                <span style={{fontSize:20}}>💬</span>
                <div style={{fontWeight:700,fontSize:15}}>Microsoft Teams Notifications</div>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{color:M,fontSize:11,marginBottom:4}}>Teams Incoming Webhook URL</div>
                <input placeholder="https://your-org.webhook.office.com/webhookb2/..." value={teamsWebhook}
                  onChange={e=>{setTeamsWebhook(e.target.value);setTeamsStatus(null);}}
                  style={{...inp({width:"100%",fontSize:12})}}/>
              </div>
              <button onClick={sendTeamsNow} disabled={teamsSending||!teamsWebhook.trim()}
                style={{background:teamsWebhook.trim()?"#6264a7":"#333",color:"#fff",border:"none",borderRadius:6,padding:"10px 20px",cursor:teamsWebhook.trim()?"pointer":"not-allowed",fontSize:13,fontWeight:600,width:"100%"}}>
                {teamsSending?"⟳ Sending...":"💬 Send to Teams Now"}
              </button>
              {teamsStatus&&<div style={{marginTop:12,padding:"10px 14px",borderRadius:6,background:teamsStatus.ok?"#1f2d1f":"#2d1f1f",color:teamsStatus.ok?"#6ea86e":"#ff8888",fontSize:13}}>{teamsStatus.msg}</div>}
            </div>
          </div>
        )}

        {/* ── SETTINGS ── */}
        {tab==="settings"&&(
          <div style={{maxWidth:560}}>
            {/* Your Name */}
            <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:20,marginBottom:14}}>
              <div style={{fontWeight:700,marginBottom:4}}>👤 Your Name</div>
              <div style={{color:M,fontSize:12,marginBottom:10}}>Used when acknowledging advisories — visible to all team members.</div>
              <div style={{display:"flex",gap:8}}>
                <input placeholder="e.g. Pankaj, Rakesh, Dileep..." value={userName} onChange={e=>setUserName(e.target.value)} style={{...inp({flex:1,fontSize:13})}}/>
                {userName.trim()&&<span style={{color:"#4ade80",fontSize:13,alignSelf:"center"}}>✓ Set</span>}
              </div>
            </div>
            {/* AI Triage Key */}
            {(()=>{
              const [ak,setAk]=React.useState(()=>localStorage.getItem("sad_apikey")||"");
              const [showAk,setShowAk]=React.useState(false);
              const saveAk=v=>{setAk(v);localStorage.setItem("sad_apikey",v);};
              return(
                <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:20,marginBottom:14}}>
                  <div style={{fontWeight:700,marginBottom:4}}>🤖 AI Triage Key</div>
                  <div style={{color:M,fontSize:12,marginBottom:10}}>Anthropic API key for one-line AI triage on Critical/High advisories. Stored in your browser only.</div>
                  <div style={{display:"flex",gap:8}}>
                    <input type={showAk?"text":"password"} placeholder="sk-ant-api03-…" value={ak} onChange={e=>saveAk(e.target.value)}
                      style={{...inp({flex:1,fontSize:12,fontFamily:"monospace"})}}/>
                    <button onClick={()=>setShowAk(v=>!v)} style={{background:"#21262d",color:M,border:`1px solid ${B}`,borderRadius:6,padding:"0 12px",cursor:"pointer",fontSize:13}}>{showAk?"Hide":"Show"}</button>
                  </div>
                  {ak&&<div style={{color:"#4ade80",fontSize:12,marginTop:8}}>✓ API key saved — AI Triage available on Critical/High advisories</div>}
                </div>
              );
            })()}
            {/* Team Acknowledgment Summary */}
            <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:20,marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
                <div style={{fontWeight:700}}>✅ Team Acknowledgment Summary</div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{color:M,fontSize:12}}>{Object.keys(acks).length} total</span>
                  <button onClick={()=>{fetch(`${PROXY_URL}/ack`,{headers:getAuthHeader()}).then(r=>r.json()).then(d=>setAcks(d.acks||{})).catch(()=>{});}}
                    style={{background:"#21262d",color:M,border:`1px solid ${B}`,borderRadius:4,padding:"2px 8px",cursor:"pointer",fontSize:11}}>↻ Refresh</button>
                </div>
              </div>
              <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                <select onChange={e=>{window._ackFilter=e.target.value;window.dispatchEvent(new Event('ackfilter'));}} style={{...inp({fontSize:12,flex:1,minWidth:120})}}>
                  <option value="">All Members</option>
                  {[...new Set(Object.values(acks).map(a=>a.by))].sort().map(name=><option key={name} value={name}>{name}</option>)}
                </select>
                <select onChange={e=>{window._ackSort=e.target.value;window.dispatchEvent(new Event('ackfilter'));}} style={{...inp({fontSize:12})}}>
                  <option value="newest">Newest First</option>
                  <option value="oldest">Oldest First</option>
                  <option value="name">By Member</option>
                </select>
              </div>
              {Object.keys(acks).length===0?(
                <div style={{color:M,fontSize:13}}>No advisories acknowledged yet.</div>
              ):(()=>{
                const memberFilter=window._ackFilter||"";
                const sortBy=window._ackSort||"newest";
                let entries=Object.entries(acks);
                if(memberFilter)entries=entries.filter(([,info])=>info.by===memberFilter);
                entries.sort(([,a],[,b])=>{
                  if(sortBy==="oldest")return new Date(a.at)-new Date(b.at);
                  if(sortBy==="name")return a.by.localeCompare(b.by);
                  return new Date(b.at)-new Date(a.at);
                });
                const grouped={};
                entries.forEach(([id,info])=>{if(!grouped[info.by])grouped[info.by]=[];grouped[info.by].push([id,info]);});
                return(
                  <div style={{display:"flex",flexDirection:"column",gap:10,maxHeight:400,overflowY:"auto"}}>
                    {Object.entries(grouped).map(([member,items])=>(
                      <div key={member}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                          <span style={{background:"#1f6feb22",color:"#58a6ff",border:"1px solid #1f6feb44",borderRadius:10,padding:"2px 10px",fontSize:11,fontWeight:700}}>
                            👤 {member}
                          </span>
                          <span style={{color:M,fontSize:11}}>{items.length} acknowledged</span>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:4,paddingLeft:8,borderLeft:"2px solid #1f6feb44"}}>
                          {items.map(([id,info])=>(
                            <div key={id} style={{background:D,borderRadius:6,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontSize:11,fontWeight:600,color:"#4ade80",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{id}</div>
                                <div style={{fontSize:10,color:M}}>{fmtTs(info.at)}</div>
                                {info.note&&<div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>📝 {info.note}</div>}
                              </div>
                              {member===userName&&(
                                <button onClick={()=>handleUnack(id,null)}
                                  style={{background:"none",border:`1px solid ${B}`,color:"#ff4444",borderRadius:4,padding:"2px 8px",cursor:"pointer",fontSize:10,flexShrink:0}}>Undo</button>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })()}
            </div>
            {/* Session */}
            <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:20,marginBottom:14}}>
              <div style={{fontWeight:700,marginBottom:4}}>🔐 Session</div>
              <div style={{color:M,fontSize:12,marginBottom:12}}>Your login session lasts 7 days before re-authentication is required.</div>
              <div style={{background:D,borderRadius:6,padding:"10px 14px",marginBottom:12}}>
                {(()=>{const s=getSession();return s?
                  <div style={{fontSize:12}}><span style={{color:"#00aa00"}}>✅ Authenticated</span> · Expires: <strong>{new Date(s.expiry).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}</strong></div>:
                  <div style={{color:"#ff6b6b",fontSize:12}}>⚠️ No active session</div>;
                })()}
              </div>
              <button onClick={onLogout} style={{background:"#21262d",color:"#ff6b6b",border:"1px solid #ff444466",borderRadius:6,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:600}}>🔓 Sign Out</button>
            </div>
            {/* Data Management */}
            <div style={{background:C,border:`1px solid ${B}`,borderRadius:8,padding:20}}>
              <div style={{fontWeight:700,marginBottom:10}}>📊 Data Management</div>
              <div style={{color:M,fontSize:12,marginBottom:12}}>Export or reset your advisory data.</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={exportCSV} style={{background:"#21262d",color:T,border:`1px solid ${B}`,borderRadius:6,padding:"7px 12px",cursor:"pointer",fontSize:13}}>⬇ Export CSV</button>
                <button onClick={()=>{if(confirm("Reset advisories? Clears Supabase cache and re-fetches live feeds.")){
                  setAdvisories([]);setNewCount(0);setVisibleCount(50);
                  fetch(`${PROXY_URL}/cache/clear`,{method:"POST",headers:{"Content-Type":"application/json",...getAuthHeader()}}).catch(()=>{});
                  setTimeout(()=>doRefresh(true),500);
                }}} style={{background:"#21262d",color:"#ff4444",border:"1px solid #ff444466",borderRadius:6,padding:"7px 12px",cursor:"pointer",fontSize:13}}>↺ Reset Advisories</button>
                <button onClick={()=>{if(confirm("Reset sources to defaults?")){
                  setSources(SOURCE_LIBRARY);localStorage.removeItem("sad_sources");
                  fetch(`${PROXY_URL}/source-config/clear`,{method:"POST",headers:{"Content-Type":"application/json",...getAuthHeader()}}).catch(()=>{});
                }}} style={{background:"#21262d",color:"#ff7700",border:"1px solid #ff770066",borderRadius:6,padding:"7px 12px",cursor:"pointer",fontSize:13}}>↺ Reset Sources</button>
                <button onClick={()=>{if(confirm("Clear all status tracking? This cannot be undone.")){setStatuses({});localStorage.removeItem("sad_statuses");}}}
                  style={{background:"#21262d",color:"#cc00cc",border:"1px solid #cc00cc66",borderRadius:6,padding:"7px 12px",cursor:"pointer",fontSize:13}}>↺ Reset Statuses</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const [authState,setAuthState]=useState(()=>getSession()?"authenticated":"login");
  if(authState==="login")  return <LoginScreen onLogin={()=>setAuthState("authenticated")} onDenied={()=>setAuthState("denied")}/>;
  if(authState==="denied") return <AccessDeniedScreen onRetry={()=>setAuthState("login")}/>;
  return <Dashboard onLogout={()=>{clearSession();setAuthState("login");}}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

// PWA Service Worker
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
