  // ── FEED HEALTH MONITOR ─────────────────────────────────────────────────────
  function FeedHealthPanel(){
    const PROXY = PROXY_URL;
    const [results,setResults]   = useState({});   // {sourceId: {status,latency,itemCount,lastChecked,error,httpCode}}
    const [checking,setChecking] = useState(false);
    const [filter,setFilter]     = useState("all"); // all | ok | warn | error | unknown
    const [catFilter,setCatFilter]= useState("All");
    const [search,setSearch]     = useState("");
    const [progress,setProgress] = useState(0);
    const [lastRun,setLastRun]   = useState(null);

    // Check a single source via the proxy (avoids CORS)
    const checkSource = async (src) => {
      if(!src.rss) return {status:"no-rss",latency:null,itemCount:null,error:"No RSS feed configured",httpCode:null};
      const start = Date.now();
      try{
        const res = await fetch(
          `${PROXY}/feed-check?url=${encodeURIComponent(src.rss)}`,
          {headers:{"Content-Type":"application/json",...getAuthHeader()},signal:AbortSignal.timeout(15000)}
        );
        const latency = Date.now()-start;
        if(!res.ok){
          return{status:"error",latency,itemCount:0,error:`HTTP ${res.status}`,httpCode:res.status};
        }
        const data = await res.json();
        const count = data.item_count||0;
        const status = count>0?"ok":count===0?"warn":"error";
        return{status,latency,itemCount:count,error:count===0?"Feed reachable but returned 0 items":null,httpCode:200,lastItem:data.last_item_date||null};
      }catch(e){
        const latency=Date.now()-start;
        if(e.name==="TimeoutError"||e.name==="AbortError")
          return{status:"error",latency,itemCount:0,error:"Timeout after 15s — feed unreachable",httpCode:null};
        return{status:"error",latency,itemCount:0,error:e.message||"Network error",httpCode:null};
      }
    };

    const runCheck = async (sourcesToCheck) => {
      setChecking(true);setProgress(0);
      const list = sourcesToCheck||sources.filter(s=>s.enabled&&s.rss);
      const total = list.length;
      let done = 0;
      // Run in batches of 8 to avoid overwhelming the proxy
      const BATCH = 8;
      const newResults = {...results};
      for(let i=0;i<list.length;i+=BATCH){
        const batch = list.slice(i,i+BATCH);
        const batchResults = await Promise.all(batch.map(s=>checkSource(s).then(r=>({id:s.id,r}))));
        batchResults.forEach(({id,r})=>{ newResults[id]={...r,lastChecked:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}; });
        done += batch.length;
        setProgress(Math.round((done/total)*100));
        setResults({...newResults});
      }
      setLastRun(new Date().toLocaleString("en-GB",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}));
      setChecking(false);setProgress(0);
    };

    const recheckOne = async (src) => {
      const r = await checkSource(src);
      setResults(p=>({...p,[src.id]:{...r,lastChecked:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}}));
    };

    const statusOf = (src) => {
      if(!src.rss) return "no-rss";
      return results[src.id]?.status||"unknown";
    };

    const counts = useMemo(()=>{
      const ok=sources.filter(s=>statusOf(s)==="ok").length;
      const warn=sources.filter(s=>statusOf(s)==="warn").length;
      const error=sources.filter(s=>statusOf(s)==="error").length;
      const norss=sources.filter(s=>!s.rss).length;
      const unknown=sources.filter(s=>s.rss&&!results[s.id]).length;
      return{ok,warn,error,norss,unknown,total:sources.length};
    },[sources,results]);

    const filtered = useMemo(()=>{
      return sources.filter(s=>{
        if(catFilter!=="All"&&s.cat!==catFilter) return false;
        if(search&&![s.name,s.vendor,s.cat].some(f=>f?.toLowerCase().includes(search.toLowerCase()))) return false;
        const st=statusOf(s);
        if(filter==="ok"&&st!=="ok") return false;
        if(filter==="warn"&&st!=="warn") return false;
        if(filter==="error"&&(st!=="error"&&st!=="no-rss")) return false;
        if(filter==="unknown"&&st!=="unknown") return false;
        return true;
      });
    },[sources,results,filter,catFilter,search]);

    const dotClass = st => ({ok:"hc-dot-ok",warn:"hc-dot-warn",error:"hc-dot-error","no-rss":"hc-dot-error",unknown:"hc-dot-unknown"}[st]||"hc-dot-unknown");
    const cardClass = st => ({ok:"hc-ok",warn:"hc-warn",error:"hc-error","no-rss":"hc-error",unknown:"hc-unknown"}[st]||"hc-unknown");
    const badgeClass = st => ({ok:"hc-badge-ok",warn:"hc-badge-warn",error:"hc-badge-error","no-rss":"hc-badge-error",unknown:"hc-badge-unknown"}[st]||"hc-badge-unknown");
    const badgeLabel = st => ({ok:"✅ OK",warn:"⚠️ EMPTY",error:"❌ ERROR","no-rss":"— NO RSS",unknown:"? UNCHECKED"}[st]||"? UNCHECKED");

    return(
      <div className="health-panel">
        {/* Summary bar */}
        <div className="health-summary">
          <span style={{fontWeight:700,fontSize:14,color:"#1a1a1a"}}>🩺 Feed Health Monitor</span>
          <div className="hs-item"><span style={{color:"#15803d",fontWeight:700}}>{counts.ok}</span><span style={{color:"#888"}}>OK</span></div>
          <div className="hs-item"><span style={{color:"#ca8a04",fontWeight:700}}>{counts.warn}</span><span style={{color:"#888"}}>Empty</span></div>
          <div className="hs-item"><span style={{color:"#dc2626",fontWeight:700}}>{counts.error}</span><span style={{color:"#888"}}>Error</span></div>
          <div className="hs-item"><span style={{color:"#888",fontWeight:700}}>{counts.norss}</span><span style={{color:"#888"}}>No RSS</span></div>
          <div className="hs-item"><span style={{color:"#d1d5db",fontWeight:700}}>{counts.unknown}</span><span style={{color:"#888"}}>Unchecked</span></div>
          {lastRun&&<span style={{fontSize:11,color:"#aaa",marginLeft:"auto"}}>Last checked: {lastRun}</span>}
        </div>

        {/* Toolbar */}
        <div className="health-toolbar">
          <button className="btn btn-primary" onClick={()=>runCheck(null)} disabled={checking} style={{fontSize:12}}>
            {checking?`⟳ Checking… ${progress}%`:"▶ Check All Sources"}
          </button>
          <button className="btn btn-secondary" onClick={()=>runCheck(sources.filter(s=>s.rss&&results[s.id]?.status==="error"))} disabled={checking||!Object.keys(results).length} style={{fontSize:11}}>
            ↻ Recheck Errors ({counts.error})
          </button>
          <input placeholder="🔍 Search sources…" value={search} onChange={e=>setSearch(e.target.value)} className="field-input" style={{width:180,fontSize:12}}/>
          <select value={catFilter} onChange={e=>setCatFilter(e.target.value)} className="field-select" style={{width:"auto",fontSize:12}}>
            <option value="All">All Categories</option>
            {CATEGORIES.map(c=><option key={c}>{c}</option>)}
          </select>
          <div style={{display:"flex",gap:4}}>
            {[["all","All"],["ok","✅ OK"],["warn","⚠️ Empty"],["error","❌ Error"],["unknown","? Unchecked"]].map(([v,l])=>(
              <button key={v} className={"filter-chip"+(filter===v?" active":"")} onClick={()=>setFilter(v)} style={{fontSize:11}}>{l}</button>
            ))}
          </div>
        </div>

        {/* Progress bar */}
        {checking&&(
          <div style={{height:3,background:"#f0f0f0",flexShrink:0}}>
            <div style={{height:"100%",background:"#c0392b",width:`${progress}%`,transition:"width 0.3s ease"}}/>
          </div>
        )}

        {/* Empty state */}
        {!checking&&Object.keys(results).length===0&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,color:"#bbb"}}>
            <div style={{fontSize:48}}>🩺</div>
            <div style={{fontSize:14,fontWeight:600,color:"#ccc"}}>No health checks run yet</div>
            <div style={{fontSize:12,color:"#ddd",textAlign:"center",maxWidth:300,lineHeight:1.6}}>
              Click <strong style={{color:"#c0392b"}}>Check All Sources</strong> to test all {sources.filter(s=>s.rss).length} RSS feeds.<br/>
              The proxy will verify each URL, count items, and flag broken or changed feeds.
            </div>
            <button className="btn btn-primary" onClick={()=>runCheck(null)} style={{marginTop:8}}>▶ Start Health Check</button>
          </div>
        )}

        {/* Results grid */}
        {Object.keys(results).length>0&&(
          <div className="health-scroll">
            {!checking&&filtered.filter(s=>statusOf(s)!=="ok"&&statusOf(s)!=="unknown").length>0&&(
              <div style={{margin:"12px 16px 0",padding:"10px 14px",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:7,fontSize:12}}>
                <strong style={{color:"#dc2626"}}>⚠️ {filtered.filter(s=>statusOf(s)==="error"||statusOf(s)==="no-rss").length} sources need attention</strong>
                <span style={{color:"#888",marginLeft:8}}>Feeds may have moved, changed format, or become unavailable.</span>
              </div>
            )}
            <div className="health-grid">
              {filtered.map(src=>{
                const st=statusOf(src);
                const r=results[src.id];
                const cc=CAT_COLORS[src.cat]||"#888";
                return(
                  <div key={src.id} className={`health-card ${cardClass(st)}`}>
                    <div className="hc-header">
                      <div className={`hc-dot ${dotClass(st)}`}/>
                      <div className="hc-name" title={src.name}>{src.name}</div>
                      <span className={`hc-badge ${badgeClass(st)}`}>{badgeLabel(st)}</span>
                      {src.tier===1&&<span style={{fontSize:9,fontWeight:700,color:"#2563eb",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:3,padding:"1px 5px"}}>T1</span>}
                    </div>
                    <div className="hc-meta">
                      <span style={{color:cc,fontWeight:600,fontSize:10}}>{src.cat}</span>
                      <span>·</span>
                      <span>{src.vendor}</span>
                      {r?.latency&&<span>· {r.latency}ms</span>}
                      {r?.itemCount!=null&&r.status==="ok"&&<span>· {r.itemCount} items</span>}
                      {r?.lastItem&&<span>· last: {new Date(r.lastItem).toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</span>}
                      {r?.lastChecked&&<span style={{marginLeft:"auto",color:"#ccc"}}>checked {r.lastChecked}</span>}
                    </div>
                    {r?.error&&<div className="hc-error-msg">⚠ {r.error}</div>}
                    <div className="hc-url" title={src.rss||"No RSS configured"}>{src.rss||<em>No RSS feed — portal only</em>}</div>
                    <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                      {src.rss&&(
                        <button className="btn btn-ghost" style={{fontSize:10,padding:"3px 8px"}} onClick={()=>recheckOne(src)} disabled={checking}>
                          ↻ Recheck
                        </button>
                      )}
                      {src.url&&<a href={src.url} target="_blank" rel="noreferrer" className="btn btn-ghost" style={{fontSize:10,padding:"3px 8px"}}>↗ Portal</a>}
                      {src.rss&&<a href={src.rss} target="_blank" rel="noreferrer" className="btn btn-ghost" style={{fontSize:10,padding:"3px 8px"}}>↗ RSS</a>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── CVE SEARCH PANEL (NVD API) ────────────────────────────────────────────
  function CVESearchPanel(){
    const NVD_BASE = "https://services.nvd.nist.gov/rest/json/cves/2.0";
    const PAGE_SIZE = 20;
    const [keyword,setKeyword]   = useState("");
    const [cveId,setCveId]       = useState("");
    const [severity,setSeverity] = useState("");
    const [dateFrom,setDateFrom] = useState("");
    const [dateTo,setDateTo]     = useState("");
    const [hasKev,setHasKev]     = useState(false);
    const [results,setResults]   = useState([]);
    const [total,setTotal]       = useState(0);
    const [page,setPage]         = useState(0);
    const [loading,setLoading]   = useState(false);
    const [error,setError]       = useState("");
    const [selCve,setSelCve]     = useState(null);
    const [detailLoading,setDetailLoading] = useState(false);
    const [detail,setDetail]     = useState(null);
    const nvdKey = localStorage.getItem("sad_nvdkey")||"";
    const abortRef = useRef(null);

    function buildUrl(startIndex=0){
      const params = new URLSearchParams();
      params.set("resultsPerPage", PAGE_SIZE);
      params.set("startIndex", startIndex);
      if(cveId.trim()) params.set("cveId", cveId.trim().toUpperCase());
      else {
        if(keyword.trim()) params.set("keywordSearch", keyword.trim());
        if(severity) params.set("cvssV3Severity", severity);
        if(dateFrom) params.set("pubStartDate", dateFrom+"T00:00:00.000");
        if(dateTo)   params.set("pubEndDate",   dateTo+"T23:59:59.999");
        if(hasKev)   params.set("isVulnerable", "");
      }
      return NVD_BASE + "?" + params.toString();
    }

    async function doSearch(startIndex=0){
      if(abortRef.current) abortRef.current.abort();
      abortRef.current = new AbortController();
      setLoading(true); setError(""); setDetail(null); setSelCve(null);
      try{
        const headers = nvdKey ? {"apiKey": nvdKey} : {};
        const res = await fetch(buildUrl(startIndex), {signal: abortRef.current.signal, headers});
        if(!res.ok){
          if(res.status===403) throw new Error("NVD rate limit hit — add a free NVD API key in Settings to increase limits");
          throw new Error("NVD returned "+res.status);
        }
        const data = await res.json();
        setResults(data.vulnerabilities||[]);
        setTotal(data.totalResults||0);
        setPage(startIndex/PAGE_SIZE);
      } catch(e){
        if(e.name==="AbortError") return;
        setError(e.message||"Failed to fetch from NVD");
        setResults([]); setTotal(0);
      }
      setLoading(false);
    }

    async function loadDetail(cveIdStr){
      setDetailLoading(true); setDetail(null);
      try{
        const headers = nvdKey ? {"apiKey": nvdKey} : {};
        const res = await fetch(`${NVD_BASE}?cveId=${cveIdStr}`, {headers});
        const data = await res.json();
        setDetail(data.vulnerabilities?.[0]?.cve||null);
      } catch(e){ setDetail(null); }
      setDetailLoading(false);
    }

    function selectCve(vuln){
      setSelCve(vuln.cve.id);
      loadDetail(vuln.cve.id);
    }

    function cvssScore(cve){
      return cve?.metrics?.cvssMetricV31?.[0]?.cvssData?.baseScore
          || cve?.metrics?.cvssMetricV30?.[0]?.cvssData?.baseScore
          || cve?.metrics?.cvssMetricV2?.[0]?.cvssData?.baseScore
          || null;
    }
    function cvssV(cve){
      if(cve?.metrics?.cvssMetricV31?.[0]) return "3.1";
      if(cve?.metrics?.cvssMetricV30?.[0]) return "3.0";
      if(cve?.metrics?.cvssMetricV2?.[0])  return "2.0";
      return null;
    }
    function cvssVector(cve){
      return cve?.metrics?.cvssMetricV31?.[0]?.cvssData?.vectorString
          || cve?.metrics?.cvssMetricV30?.[0]?.cvssData?.vectorString
          || cve?.metrics?.cvssMetricV2?.[0]?.cvssData?.vectorString
          || null;
    }
    function sevFromScore(s){
      if(s===null||s===undefined) return "Unknown";
      if(s>=9.0) return "Critical";
      if(s>=7.0) return "High";
      if(s>=4.0) return "Medium";
      return "Low";
    }
    function sevColor(sev){
      return {Critical:"#dc2626",High:"#ea580c",Medium:"#ca8a04",Low:"#16a34a",Unknown:"#888"}[sev]||"#888";
    }
    function cvssBarColor(s){
      if(s>=9) return "#dc2626";
      if(s>=7) return "#ea580c";
      if(s>=4) return "#ca8a04";
      return "#16a34a";
    }
    function getVendors(cve){
      const vendors = new Set();
      (cve?.configurations||[]).forEach(cfg=>{
        (cfg.nodes||[]).forEach(n=>{
          (n.cpeMatch||[]).forEach(c=>{
            const parts = c.criteria?.split(":")||[];
            if(parts[3]) vendors.add(parts[3].replace(/_/g," "));
          });
        });
      });
      return [...vendors].slice(0,8);
    }
    function getProducts(cve){
      const prods = new Set();
      (cve?.configurations||[]).forEach(cfg=>{
        (cfg.nodes||[]).forEach(n=>{
          (n.cpeMatch||[]).forEach(c=>{
            const parts = c.criteria?.split(":")||[];
            if(parts[4]) prods.add(parts[4].replace(/_/g," "));
          });
        });
      });
      return [...prods].slice(0,10);
    }
    function getCpes(cve){
      const cpes = [];
      (cve?.configurations||[]).forEach(cfg=>{
        (cfg.nodes||[]).forEach(n=>{
          (n.cpeMatch||[]).forEach(c=>{ if(c.criteria) cpes.push(c.criteria); });
        });
      });
      return [...new Set(cpes)].slice(0,12);
    }
    function getDescription(cve){
      return (cve?.descriptions||[]).find(d=>d.lang==="en")?.value||"No description available.";
    }
    function totalPages(){ return Math.ceil(total/PAGE_SIZE); }

    const handleKeyDown = e => { if(e.key==="Enter") doSearch(0); };

    return(
      <div className="cve-panel">
        {/* Search bar */}
        <div className="cve-search-bar">
          {!nvdKey&&(
            <div className="nvd-key-banner">
              ⚡ <span>Add a free NVD API key in <strong>Settings → NVD API Key</strong> for 10× higher rate limits</span>
            </div>
          )}
          <div className="cve-search-row">
            <input className="cve-search-input" placeholder="🔍 Search keywords (e.g. remote code execution, log4j, apache)…"
              value={keyword} onChange={e=>{setKeyword(e.target.value);setCveId("");}}
              onKeyDown={handleKeyDown}/>
            <input className="cve-search-input" style={{width:170,flex:"none"}} placeholder="CVE-YYYY-XXXXX"
              value={cveId} onChange={e=>{setCveId(e.target.value);setKeyword("");}}
              onKeyDown={handleKeyDown}/>
            <button className="btn btn-primary" onClick={()=>doSearch(0)} disabled={loading} style={{whiteSpace:"nowrap"}}>
              {loading?"Searching…":"Search NVD"}
            </button>
          </div>
          <div className="cve-filter-row">
            <span style={{fontSize:11,color:"#999",fontWeight:600}}>Filters:</span>
            <select value={severity} onChange={e=>setSeverity(e.target.value)}>
              <option value="">All Severity</option>
              <option value="CRITICAL">Critical</option>
              <option value="HIGH">High</option>
              <option value="MEDIUM">Medium</option>
              <option value="LOW">Low</option>
            </select>
            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}
              className="cve-search-input" style={{width:130,padding:"3px 7px",fontSize:11}}
              title="Published from"/>
            <span style={{fontSize:11,color:"#aaa"}}>→</span>
            <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}
              className="cve-search-input" style={{width:130,padding:"3px 7px",fontSize:11}}
              title="Published to"/>
            <label style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#555",cursor:"pointer"}}>
              <input type="checkbox" checked={hasKev} onChange={e=>setHasKev(e.target.checked)}/> KEV only
            </label>
            {(keyword||cveId||severity||dateFrom||dateTo||hasKev)&&(
              <button className="filter-chip" style={{color:"#c0392b",borderColor:"#fca5a5"}}
                onClick={()=>{setKeyword("");setCveId("");setSeverity("");setDateFrom("");setDateTo("");setHasKev(false);setResults([]);setTotal(0);setDetail(null);setSelCve(null);}}>
                ✕ Clear
              </button>
            )}
            {total>0&&<span style={{marginLeft:"auto",fontSize:11,color:"#888",fontWeight:600}}>{total.toLocaleString()} CVEs found</span>}
          </div>
        </div>

        {/* Body: list + detail */}
        <div className="cve-body">
          {/* CVE list */}
          <div className="cve-list">
            <div className="cve-list-header">
              <span style={{fontSize:12,fontWeight:600,color:"#444"}}>Results</span>
              <span style={{fontSize:11,color:"#aaa"}}>{results.length ? `Showing ${page*PAGE_SIZE+1}–${Math.min((page+1)*PAGE_SIZE, total)} of ${total.toLocaleString()}` : ""}</span>
            </div>
            <div className="cve-items">
              {loading&&(
                <div className="empty-state"><div className="em-icon" style={{fontSize:24}}>⟳</div><div>Querying NVD…</div></div>
              )}
              {!loading&&error&&(
                <div style={{padding:16}}>
                  <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:6,padding:"10px 12px",color:"#dc2626",fontSize:12}}>{error}</div>
                </div>
              )}
              {!loading&&!error&&results.length===0&&total===0&&(
                <div className="empty-state">
                  <div style={{fontSize:36}}>🔍</div>
                  <div style={{fontSize:13,fontWeight:600,color:"#aaa"}}>Search the NVD</div>
                  <div style={{fontSize:11,color:"#ccc",textAlign:"center",maxWidth:220,lineHeight:1.5}}>Enter keywords, a CVE ID, or use the filters above — then click Search NVD</div>
                </div>
              )}
              {results.map(vuln=>{
                const c = vuln.cve;
                const score = cvssScore(c);
                const sev = sevFromScore(score);
                const col = sevColor(sev);
                const desc = getDescription(c);
                return(
                  <div key={c.id} className={"cve-item"+(selCve===c.id?" selected":"")}
                    style={{borderLeftColor: selCve===c.id ? "#c0392b" : col}}
                    onClick={()=>selectCve(vuln)}>
                    <div className="ci-id">{c.id}</div>
                    <div className="ci-title">{c.descriptions?.find(d=>d.lang==="en")?.value||"No description"}</div>
                    <div className="ci-meta">
                      {score!==null&&(
                        <span className="badge" style={{background:col+"18",color:col,border:`1px solid ${col}33`,padding:"1px 6px",fontSize:10}}>
                          {sev} {score}
                        </span>
                      )}
                      <span>{c.published?.slice(0,10)}</span>
                      {c.cisaExploitAdd&&<span style={{color:"#dc2626",fontWeight:600}}>KEV</span>}
                    </div>
                  </div>
                );
              })}
            </div>
            {/* Pagination */}
            {total>PAGE_SIZE&&(
              <div className="pagination-row">
                <button className="page-btn" disabled={page===0} onClick={()=>doSearch((page-1)*PAGE_SIZE)}>← Prev</button>
                <span style={{fontSize:11,color:"#888"}}>Page {page+1} of {totalPages()}</span>
                <button className="page-btn" disabled={page>=totalPages()-1} onClick={()=>doSearch((page+1)*PAGE_SIZE)}>Next →</button>
              </div>
            )}
          </div>

          {/* CVE detail pane */}
          <div className="cve-detail">
            {!selCve&&!detailLoading&&(
              <div className="cve-detail-empty">
                <div style={{fontSize:44}}>🛡️</div>
                <div style={{fontSize:14,fontWeight:600}}>Select a CVE</div>
                <div style={{fontSize:12,color:"#ccc"}}>Click any CVE in the list to see full details</div>
              </div>
            )}
            {detailLoading&&(
              <div className="cve-detail-empty">
                <div style={{fontSize:32}}>⟳</div>
                <div style={{fontSize:13,color:"#aaa"}}>Loading CVE details…</div>
              </div>
            )}
            {!detailLoading&&detail&&(()=>{
              const score = cvssScore(detail);
              const sev = sevFromScore(score);
              const col = sevColor(sev);
              const ver = cvssV(detail);
              const vec = cvssVector(detail);
              const vendors = getVendors(detail);
              const products = getProducts(detail);
              const cpes = getCpes(detail);
              const refs = (detail.references||[]).slice(0,12);
              const weaknesses = (detail.weaknesses||[]).flatMap(w=>w.description||[]).map(d=>d.value).filter(Boolean);
              const isKev = !!detail.cisaExploitAdd;
              return(
                <>
                  {/* Detail header */}
                  <div className="cve-detail-header">
                    <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
                      {score!==null&&(
                        <span className="badge" style={{background:col+"18",color:col,border:`1px solid ${col}33`,fontSize:11}}>
                          {sev.toUpperCase()} {score}{ver&&` (v${ver})`}
                        </span>
                      )}
                      {isKev&&<span className="kev-badge">🚨 CISA KEV — Actively Exploited</span>}
                      {weaknesses.map(w=>(
                        <span key={w} style={{background:"#fdf4ff",color:"#7e22ce",border:"1px solid #e9d5ff",borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700}}>{w}</span>
                      ))}
                    </div>
                    <div style={{fontSize:15,fontWeight:700,color:"#1a1a1a",lineHeight:1.4,marginBottom:6}}>{detail.id}</div>
                    <div style={{fontSize:11,color:"#aaa",display:"flex",gap:14}}>
                      <span>Published: <strong style={{color:"#555"}}>{detail.published?.slice(0,10)}</strong></span>
                      <span>Modified: <strong style={{color:"#555"}}>{detail.lastModified?.slice(0,10)}</strong></span>
                      <span>Status: <strong style={{color:"#555"}}>{detail.vulnStatus||"—"}</strong></span>
                    </div>
                    {score!==null&&(
                      <div style={{marginTop:8}}>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#888",marginBottom:2}}>
                          <span>CVSS {ver} Score</span><span style={{fontWeight:700,color:col}}>{score}/10</span>
                        </div>
                        <div className="cvss-bar">
                          <div className="cvss-fill" style={{width:`${(score/10)*100}%`,background:cvssBarColor(score)}}/>
                        </div>
                        {vec&&<div style={{fontSize:10,color:"#aaa",marginTop:3,fontFamily:"monospace"}}>{vec}</div>}
                      </div>
                    )}
                  </div>
                  {/* Detail scrollable body */}
                  <div className="cve-detail-scroll">
                    {/* Description */}
                    <div style={{marginBottom:14}}>
                      <div className="field-label" style={{marginBottom:6}}>Description</div>
                      <div className="desc-box" style={{maxHeight:120}}>{getDescription(detail)}</div>
                    </div>
                    {/* KEV details */}
                    {isKev&&(
                      <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:7,padding:"10px 12px",marginBottom:14}}>
                        <div style={{fontWeight:700,color:"#dc2626",fontSize:12,marginBottom:6}}>🚨 CISA Known Exploited Vulnerability</div>
                        {detail.cisaVulnerabilityName&&<div style={{fontSize:12,marginBottom:3}}><span style={{color:"#999"}}>Name:</span> {detail.cisaVulnerabilityName}</div>}
                        {detail.cisaRequiredAction&&<div style={{fontSize:12,marginBottom:3}}><span style={{color:"#999"}}>Required Action:</span> {detail.cisaRequiredAction}</div>}
                        {detail.cisaActionDue&&<div style={{fontSize:12}}><span style={{color:"#999"}}>Due Date:</span> <strong style={{color:"#dc2626"}}>{detail.cisaActionDue}</strong></div>}
                      </div>
                    )}
                    {/* Vendors & Products */}
                    {vendors.length>0&&(
                      <div style={{marginBottom:12}}>
                        <div className="field-label" style={{marginBottom:6}}>Affected Vendors</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                          {vendors.map(v=><span key={v} className="product-tag" style={{textTransform:"capitalize"}}>{v}</span>)}
                        </div>
                      </div>
                    )}
                    {products.length>0&&(
                      <div style={{marginBottom:12}}>
                        <div className="field-label" style={{marginBottom:6}}>Affected Products</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                          {products.map(p=><span key={p} className="product-tag" style={{textTransform:"capitalize"}}>{p}</span>)}
                        </div>
                      </div>
                    )}
                    {/* CPE strings */}
                    {cpes.length>0&&(
                      <div style={{marginBottom:12}}>
                        <div className="field-label" style={{marginBottom:6}}>CPE Identifiers ({cpes.length})</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                          {cpes.map(c=><span key={c} className="cpe-tag">{c}</span>)}
                        </div>
                      </div>
                    )}
                    {/* References */}
                    {refs.length>0&&(
                      <div style={{marginBottom:12}}>
                        <div className="field-label" style={{marginBottom:6}}>References ({(detail.references||[]).length})</div>
                        <div style={{background:"#fafafa",border:"1px solid #f0f0f0",borderRadius:6,padding:"8px 10px"}}>
                          {refs.map((r,i)=>(
                            <a key={i} href={r.url} target="_blank" rel="noreferrer" className="cve-ref-link">{r.url}</a>
                          ))}
                          {(detail.references||[]).length>12&&<div style={{fontSize:11,color:"#aaa",marginTop:4}}>+{(detail.references||[]).length-12} more references</div>}
                        </div>
                      </div>
                    )}
                  </div>
                  {/* Footer actions */}
                  <div className="cve-detail-footer">
                    <a href={`https://nvd.nist.gov/vuln/detail/${detail.id}`} target="_blank" rel="noreferrer" className="btn btn-primary">🔗 NVD Full Record</a>
                    <a href={`https://www.cve.org/CVERecord?id=${detail.id}`} target="_blank" rel="noreferrer" className="btn btn-secondary">📋 CVE.org</a>
                    <a href={`https://www.exploit-db.com/search?cve=${detail.id}`} target="_blank" rel="noreferrer" className="btn btn-secondary">💣 Exploit-DB</a>
                    {isKev&&<a href="https://www.cisa.gov/known-exploited-vulnerabilities-catalog" target="_blank" rel="noreferrer" className="btn btn-danger">🚨 CISA KEV</a>}
                  </div>
                </>
              );
            })()}
          </div>
        </div>
      </div>
    );
  }

  // ── MAIN RENDER ───────────────────────────────────────────────────────────
  return(
    <div className="app-shell">
      {/* TOP BAR */}
      <div className="top-bar">
        <div className="tb-logo" style={{display:"flex",alignItems:"center",gap:8}}>
          {/* Concentrix logo: teal pill + white C on navy */}
          <svg width="44" height="27" viewBox="0 0 44 27" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="0" width="44" height="27" rx="13.5" fill="#00C9B1"/>
            <circle cx="27" cy="13.5" r="9" fill="white"/>
            <circle cx="27" cy="13.5" r="5.5" fill="#00C9B1"/>
            <rect x="27" y="9.5" width="10" height="8" fill="#00C9B1"/>
          </svg>
          <span style={{fontSize:12,fontWeight:700,color:"#c0392b"}}>Security Advisory</span>
          <span style={{fontSize:11,color:"#aaa",fontWeight:400}}>GSE · SOC</span>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          {autoRefresh?(
            <div className="live-pill"><div className="live-dot-green"/><span>Live</span><CountdownTimer nextRefresh={nextRefresh} autoRefresh={autoRefresh}/></div>
          ):(
            <div className="paused-pill"><div className="paused-dot-gray"/><span>Paused</span></div>
          )}
          {/* PWA Install button — shown when installable */}
          <PWAInstallButton/>
          <button className="btn btn-secondary" onClick={()=>doRefresh(true)} disabled={fLoad} style={{fontSize:12}}>{fLoad?"⟳ Fetching…":"⟳ Refresh"}</button>
          <button className="btn btn-secondary" onClick={exportCSV} style={{fontSize:12}}>⬇ CSV</button>
          <button className="btn btn-ghost" onClick={onLogout} style={{color:"#dc2626",fontSize:12}}>🔓 Sign Out</button>
        </div>
      </div>

      {/* STATS BAR — grouped: Severity | Threat Activity | Workflow | Timestamp */}
      <div className="stats-bar">
        {/* Group 1: Total + Severity */}
        <div className="stat-group">
          <div className="stat-group-label">Severity</div>
          {[["Total",stats.total,"#444"],["Critical",stats.critical,"#dc2626"],["High",stats.high,"#ea580c"],["Medium",stats.medium,"#ca8a04"],["Low",stats.low,"#16a34a"]].map(([l,v,c])=>(
            <div key={l} className="stat-item">
              <div className="stat-val" style={{color:v>0?c:"#ccc"}}>{fLoad&&v===0?"…":v}</div>
              <div className="stat-lbl">{l}</div>
            </div>
          ))}
        </div>
        {/* Group 2: Threat Signals */}
        <div className="stat-group">
          <div className="stat-group-label">Threats</div>
          <div className="stat-item">
            <div className="stat-val" style={{color:stats.zeroDay>0?"#9333ea":"#ccc"}}>{fLoad&&stats.zeroDay===0?"…":stats.zeroDay}</div>
            <div className="stat-lbl">Zero-Days</div>
          </div>
          <div className="stat-item clickable" onClick={stats.newItems>0?()=>{setFNew(true);setTab("feed");setSideFilter("all");}:undefined}
            style={stats.newItems>0?{background:"#eff6ff"}:{}}>
            <div className="stat-val" style={{color:stats.newItems>0?"#2563eb":"#ccc"}}>{fLoad&&stats.newItems===0?"…":stats.newItems}</div>
            <div className="stat-lbl" style={{color:stats.newItems>0?"#2563eb":undefined}}>New ↗</div>
          </div>
        </div>
        {/* Group 3: Workflow */}
        <div className="stat-group">
          <div className="stat-group-label">Workflow</div>
          <div className="stat-item" style={stats.slaOverdue>0?{background:"#fef2f2"}:{}}>
            <div className="stat-val" style={{color:stats.slaOverdue>0?"#dc2626":"#ccc"}}>{fLoad&&stats.slaOverdue===0?"…":stats.slaOverdue}</div>
            <div className="stat-lbl" style={{color:stats.slaOverdue>0?"#dc2626":undefined}}>SLA Due</div>
          </div>
          <div className="stat-item clickable" title="Click to filter assigned advisories"
            onClick={stats.assigned>0?()=>{setFAssignee("All");setFAck("Acknowledged");setTab("feed");}:undefined}>
            <div className="stat-val" style={{color:stats.assigned>0?"#0369a1":"#ccc",fontSize:16}}>{fLoad&&stats.assigned===0?"…":stats.assigned}</div>
            <div className="stat-lbl">Assigned</div>
          </div>
          {userName&&<div className="stat-item clickable" title={`Assigned to me (${userName})`}
            onClick={stats.assignedToMe>0?()=>{setFAssignee("me");setTab("feed");setSideFilter("all");}:undefined}
            style={stats.assignedToMe>0?{background:"#f0f9ff"}:{}}>
            <div className="stat-val" style={{color:stats.assignedToMe>0?"#0369a1":"#ccc",fontSize:16}}>{fLoad&&stats.assignedToMe===0?"…":stats.assignedToMe}</div>
            <div className="stat-lbl" style={{color:stats.assignedToMe>0?"#0369a1":undefined}}>My Work</div>
          </div>}
          <div className="stat-item">
            <div className="stat-val" style={{color:srcStats.enabled>0?"#6b7280":"#ccc",fontSize:15}}>{srcStats.enabled}</div>
            <div className="stat-lbl">Sources</div>
          </div>
        </div>
        {/* Timestamp — right-aligned */}
        <div className="stat-item" style={{marginLeft:"auto",textAlign:"right",paddingRight:16,borderLeft:"1px solid #f0f0f0"}}>
          <div style={{fontSize:11,color:"#aaa",fontWeight:500}}>{lastFetched?"Updated":""}</div>
          <div style={{fontSize:11,color:"#666",fontWeight:500}}>{lastFetched||"Never fetched"}</div>
        </div>
      </div>

      {/* NEW BANNER */}
      {newCount>0&&(
        <div className="new-banner">
          <span style={{fontSize:16}}>🔔</span>
          <span style={{flex:1,fontSize:12}}><strong style={{color:"#1d4ed8"}}>{newCount} new {newCount>1?"advisories":"advisory"}</strong> detected since last refresh</span>
          <button className="btn btn-primary" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>{setFNew(true);setTab("feed");setSideFilter("all");}}>View New</button>
          <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>{setFNew(false);clearNew();}}>Dismiss</button>
        </div>
      )}

      {/* MAIN AREA */}
      <div className="main-area">
        <Sidebar/>

        {/* MIDDLE + RIGHT for feed tab */}
        {tab==="feed"&&(
          <>
            {/* Middle panel */}
            <div className="mid-panel">
              <div className="mid-header">
                <div className="mid-title">
                  {fAssignee==="me"?"My Work":fAssignee!=="All"?`Assigned: ${fAssignee}`:sideFilter==="all"?"All Advisories":sideFilter}
                  <span style={{background:"#f0f0f0",color:"#888",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:600}}>{filtered.length}</span>
                  {fAssignee!=="All"&&(
                    <button onClick={()=>setFAssignee("All")} style={{marginLeft:"auto",background:"none",border:"none",color:"#aaa",cursor:"pointer",fontSize:13,padding:"0 2px"}} title="Clear assignee filter">✕</button>
                  )}
                </div>
                {/* Severity row */}
                <div className="mid-filter-row">
                  {["All","Critical","High","Medium","Low"].map(s=>(
                    <button key={s} className={"filter-chip"+(fSev===s?" active":"")} onClick={()=>setFSev(s)}>{s}</button>
                  ))}
                  <button className={"filter-chip"+(fZD?" active":"")} onClick={()=>setFZD(v=>!v)}>0-Day</button>
                  <button className={"filter-chip"+(fNew?" active":"")} onClick={()=>setFNew(v=>!v)}>New</button>
                </div>
              </div>
              {/* Old data warning */}
              {advisories.length>0&&(()=>{
                const oldCount=advisories.filter(a=>{
                  try{const d=new Date(a.published||a.date);return !isNaN(d)&&(Date.now()-d.getTime())>30*24*3600000;}catch{return false;}
                }).length;
                if(oldCount===0)return null;
                return(
                  <div style={{padding:"5px 10px",background:"#fff7ed",borderBottom:"1px solid #fed7aa",display:"flex",alignItems:"center",gap:7,fontSize:11,color:"#92400e",flexShrink:0}}>
                    <span>⚠️</span>
                    <span><strong>{oldCount} advisories</strong> are older than 30 days — go to Settings → Reset &amp; Refresh to clear stale cache</span>
                  </div>
                );
              })()}
              {/* Search */}
              <div className="mid-search">
                <input placeholder="🔍 Search ID, title, vendor..." value={search} onChange={e=>setSearch(e.target.value)}/>
              </div>
              {/* Extra filters */}
              <div className="mid-extra-filters">
                <select value={fAck} onChange={e=>setFAck(e.target.value)}>
                  <option value="All">All</option>
                  <option value="Acknowledged">✅ Acked</option>
                  <option value="Unacknowledged">⬜ Unacked</option>
                </select>
                <select value={fStatus} onChange={e=>setFStatus(e.target.value)}>
                  <option value="All">All Status</option>
                  {STATUS_OPTIONS.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
                {/* Assignee filter */}
                <select value={fAssignee} onChange={e=>setFAssignee(e.target.value)}
                  style={fAssignee!=="All"?{borderColor:"#c0392b",color:"#c0392b",fontWeight:600}:{}}>
                  <option value="All">All Assigned</option>
                  {userName&&<option value="me">👤 My Work ({stats.assignedToMe})</option>}
                  {TEAM_MEMBERS.filter(m=>m!=="Unassigned"&&assigneeCounts[m]>0).map(m=>(
                    <option key={m} value={m}>{m} ({assigneeCounts[m]})</option>
                  ))}
                  {stats.unassigned>0&&<option value="__unassigned__" disabled>— {stats.unassigned} acked but unassigned</option>}
                </select>
                {sideFilter==="all"&&(
                  <select value={fCat} onChange={e=>setFCat(e.target.value)}>
                    <option value="All">All Categories</option>
                    {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                )}
                <select value={fDateRange} onChange={e=>setFDateRange(e.target.value)}>
                  <option value="all">All Time</option>
                  <option value="today">Today</option>
                  <option value="7d">Last 7 Days</option>
                  <option value="30d">Last 30 Days</option>
                  <option value="90d">Last 90 Days</option>
                  <option value="custom">Custom…</option>
                </select>
                {(fSev!=="All"||fZD||fNew||fAck!=="All"||fStatus!=="All"||fAssignee!=="All"||fCat!=="All"||fDateRange!=="all"||search)&&(
                  <button className="filter-chip" style={{color:"#c0392b",borderColor:"#fca5a5"}} onClick={()=>{setFSev("All");setFZD(false);setFNew(false);setFAck("All");setFStatus("All");setFAssignee("All");setFCat("All");setFDateRange("all");setSearch("");}}>✕ Clear</button>
                )}
              </div>
              {fDateRange==="custom"&&(
                <div style={{display:"flex",gap:5,padding:"5px 10px",background:"#fafafa",borderBottom:"1px solid #efefef",flexShrink:0}}>
                  <input type="date" value={fDateFrom} onChange={e=>setFDateFrom(e.target.value)} className="field-input" style={{flex:1,padding:"3px 7px",fontSize:11}}/>
                  <span style={{color:"#aaa",alignSelf:"center",fontSize:11}}>→</span>
                  <input type="date" value={fDateTo} onChange={e=>setFDateTo(e.target.value)} className="field-input" style={{flex:1,padding:"3px 7px",fontSize:11}}/>
                </div>
              )}
              <div className="mid-list">
                {fLoad&&advisories.length===0&&(
                  <div className="empty-state"><div className="em-icon">⟳</div><div style={{fontSize:13}}>Loading advisories…</div></div>
                )}
                {!fLoad&&filtered.length===0&&advisories.length>0&&(
                  <div className="empty-state"><div className="em-icon">🔍</div><div>No advisories match filters</div></div>
                )}
                {!fLoad&&advisories.length===0&&(
                  <div className="empty-state"><div className="em-icon">🛡️</div><div>No advisories loaded yet</div><div style={{fontSize:11,marginTop:6}}>Click Refresh to fetch live data</div></div>
                )}
                {filtered.slice(0,visibleCount).map(a=><FeedItem key={a.id} a={a}/>)}
                {filtered.length>visibleCount&&(
                  <button className="load-more-btn" onClick={()=>setVisibleCount(c=>c+50)}>
                    Load more — {visibleCount} of {filtered.length} shown
                  </button>
                )}
              </div>
            </div>

            {/* Drag-to-resize handle */}
            <div className="mid-panel-resize" onMouseDown={e=>{
              e.preventDefault();
              const panel=e.currentTarget.previousSibling;
              const startX=e.clientX;
              const startW=panel.offsetWidth;
              const onMove=ev=>{const w=Math.max(280,Math.min(520,startW+(ev.clientX-startX)));panel.style.width=w+"px";};
              const onUp=()=>{document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp);};
              document.addEventListener("mousemove",onMove);
              document.addEventListener("mouseup",onUp);
            }} title="Drag to resize"/>
            {/* Right reading pane */}
            <ReadingPane advisory={selectedAdvisory}/>
          </>
        )}

        {tab==="sources"&&<SourcesPanel/>}
        {tab==="autorefresh"&&<AutoRefreshPanel/>}
        {tab==="email"&&<EmailPanel/>}
        {tab==="settings"&&<SettingsPanel/>}
        {tab==="cvesearch"&&<CVESearchPanel/>}
        {tab==="feedhealth"&&<FeedHealthPanel/>}
      </div>
    </div>
  );
}

function App(){
  const [authState,setAuthState]=useState(()=>getSession()?"authenticated":"login");
  if(authState==="login")  return <LoginScreen onLogin={()=>setAuthState("authenticated")} onDenied={()=>setAuthState("denied")}/>;
  if(authState==="denied") return <AccessDeniedScreen onRetry={()=>setAuthState("login")}/>;
  return(
    <>
      <Dashboard onLogout={()=>{clearSession();setAuthState("login");}}/>
      <PWAInstallBanner/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

// SW registered early in plain script above
</script>
</body>
</html>
